<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mozilla+Text:wght@200..700&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,400;1,700&family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="assets/Favicon/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="assets/Favicon/favicon.svg" />
<link rel="shortcut icon" href="assets/Favicon/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="assets/Favicon/apple-touch-icon.png" />
<link rel="manifest" href="assets/Favicon/site.webmanifest" />
<script src="./gate.js"></script>
<script src="./theme.js"></script>
<script src="./firebase.js"></script>
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  ::selection{background:#8ee05e;color:#08100d;}
  select{appearance:none;-webkit-appearance:none;}
  .ak-topic-card:hover{transform:translateY(-2px);border-color:rgba(22,54,30,0.28);}
  .ak-new-topic:hover{background:#0f2716;}
</style>
</helmet>

<div style="background:#e3fbd8;min-height:100vh;font-family:'Ubuntu',Arial,sans-serif;color:#08100d;">
  <dc-import name="Header" active="explore" hint-size="100%,72px"></dc-import>

  <section style="max-width:1200px;margin:0 auto;padding:clamp(32px,4vw,56px) clamp(20px,4vw,40px) clamp(48px,5vw,80px);">
    <div style="margin-bottom:32px;">
      <h1 style="font-family:'Ubuntu',Arial,sans-serif;font-size:clamp(34px,4.4vw,52px);color:#16361e;margin:0 0 10px;letter-spacing:-0.4px;">Topics</h1>
      <p style="font-size:18px;color:#33473b;margin:0;max-width:560px;">Browse practical discussions from arable farmers across the Netherlands. Filter by category, region, or what the community is talking about right now.</p>
    </div>

    <div class="ak-explore-grid" style="display:grid;grid-template-columns:268px 1fr;gap:28px;align-items:start;">
      <!-- SIDEBAR -->
      <aside style="display:flex;flex-direction:column;gap:20px;">
        <a href="CreatePost.dc.html" class="ak-new-topic" style="display:flex;align-items:center;justify-content:center;gap:9px;min-height:52px;text-decoration:none;font-size:16px;font-weight:600;color:#eafbe1;background:#16361e;border-radius:14px;transition:background .18s ease;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#eafbe1" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"></path></svg>
          New topic
        </a>

        <div style="background:#ffffff;border:1px solid rgba(22,54,30,0.13);border-radius:18px;padding:20px;">
          <h3 style="font-family:'Ubuntu',Arial,sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#5a7060;margin:0 0 14px;">Category</h3>
          <div style="display:flex;flex-direction:column;gap:4px;">
            <sc-for list="{{ catList }}" as="c" hint-placeholder-count="7">
              <button type="button" onClick="{{ c.onClick }}" style="{{ c.style }}">
                <span>{{ c.name }}</span>
                <span style="{{ c.countStyle }}">{{ c.count }}</span>
              </button>
            </sc-for>
          </div>
        </div>

        <div style="background:#ffffff;border:1px solid rgba(22,54,30,0.13);border-radius:18px;padding:20px;">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;">
            <h3 style="font-family:'Ubuntu',Arial,sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#5a7060;margin:0;">Region</h3>
            <div style="display:inline-flex;align-items:center;gap:3px;background:#e3fbd8;border:1px solid rgba(22,54,30,0.15);border-radius:999px;padding:3px;">
              <button type="button" onClick="{{ showMapRegion }}" style="{{ mapToggleStyle }}">Map</button>
              <button type="button" onClick="{{ showTextRegion }}" style="{{ textToggleStyle }}">Text</button>
            </div>
          </div>

          <sc-if value="{{ regionMapVisible }}" hint-placeholder-val="{{ true }}">
            <div style="display:flex;justify-content:center;margin:2px 0 12px;">
              <dc-import name="NLMap" selected="{{ mapSelected }}" interactive="true" showCaption="false" onSelect="{{ onMapRegion }}" hint-size="228px,260px"></dc-import>
            </div>
            <div style="display:flex;flex-direction:column;gap:8px;">
              <div style="font-size:13px;line-height:1.4;color:#5a7060;">{{ regionHint }}</div>
              <button type="button" onClick="{{ clearRegion }}" style="{{ allRegionsStyle }}">{{ allRegionsLabel }}</button>
            </div>
          </sc-if>

          <sc-if value="{{ regionTextVisible }}" hint-placeholder-val="{{ false }}">
            <div style="position:relative;">
              <select value="{{ region }}" onChange="{{ onRegion }}" style="width:100%;font-family:'Ubuntu',Arial,sans-serif;font-size:15px;color:#16361e;background:#e3fbd8;border:1px solid rgba(22,54,30,0.18);border-radius:12px;padding:13px 38px 13px 14px;cursor:pointer;">
                <sc-for list="{{ regionOpts }}" as="r" hint-placeholder-count="6">
                  <option value="{{ r.id }}">{{ r.name }}</option>
                </sc-for>
              </select>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#16361e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);pointer-events:none;"><path d="M6 9l6 6 6-6"></path></svg>
            </div>
          </sc-if>
        </div>
      </aside>

      <!-- MAIN -->
      <div>
        <div style="position:relative;margin-bottom:18px;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#5a7060" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="position:absolute;left:18px;top:50%;transform:translateY(-50%);"><circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4.3-4.3"></path></svg>
          <input type="text" value="{{ query }}" onInput="{{ onQuery }}" placeholder="Search topics, crops, methods..." style="width:100%;font-family:'Ubuntu',Arial,sans-serif;font-size:16px;color:#08100d;background:#ffffff;border:1px solid rgba(22,54,30,0.16);border-radius:14px;padding:16px 18px 16px 50px;" />
        </div>

        <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px;">
          <span style="font-size:15px;color:#5a7060;">{{ resultLabel }}</span>
          <div style="display:flex;gap:6px;background:#ffffff;border:1px solid rgba(22,54,30,0.13);border-radius:999px;padding:5px;">
            <sc-for list="{{ sortList }}" as="s" hint-placeholder-count="2">
              <button type="button" onClick="{{ s.onClick }}" style="{{ s.style }}">{{ s.name }}</button>
            </sc-for>
          </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:14px;">
          {{ topicsEl }}
        </div>
      </div>
    </div>
  </section>

  <dc-import name="Footer" hint-size="100%,320px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{}">
class Component extends DCLogic {
  state = { category: 'all', region: 'all', regionMode: 'map', sort: 'latest', query: '', remoteTopics: null, topicsError: '', configured: false };

  h(type, props, ...children) {
    return React.createElement(type, props, ...children);
  }

  componentDidMount() {
    const configured = !!(window.AK && window.AK.isConfigured && window.AK.isConfigured());
    this.setState({ configured });
    if (configured) {
      this._unsub = window.AK.watchTopics((rows, err) => {
        if (err) this.setState({ topicsError: err });
        else this.setState({ remoteTopics: rows || [], topicsError: '' });
      });
    } else {
      this.setState({ remoteTopics: [] });
    }
  }

  componentWillUnmount() {
    if (this._unsub) this._unsub();
  }

  CATS = ['Soil & Tillage', 'Fertilisation & Nutrients', 'Crop Protection', 'Crops & Rotation', 'Water & Drainage', 'Precision & Technology', 'Machinery', 'Storage & Marketing', 'Other'];

  REGIONS = [
    { id: 'all', name: 'All regions' },
    { id: 'groningen', name: 'Groningen' }, { id: 'friesland', name: 'Friesland' }, { id: 'drenthe', name: 'Drenthe' },
    { id: 'noordholland', name: 'Noord-Holland' }, { id: 'flevoland', name: 'Flevoland' }, { id: 'overijssel', name: 'Overijssel' },
    { id: 'utrecht', name: 'Utrecht' }, { id: 'gelderland', name: 'Gelderland' }, { id: 'zuidholland', name: 'Zuid-Holland' },
    { id: 'zeeland', name: 'Zeeland' }, { id: 'noordbrabant', name: 'Noord-Brabant' }, { id: 'limburg', name: 'Limburg' },
  ];

  regionName(id) {
    const found = this.REGIONS.find((r) => r.id === id);
    return found ? found.name : 'All regions';
  }

  topics() { return this.state.remoteTopics || []; }

  fmtActivity(ms) {
    if (!ms) return 'just now';
    const h = Math.max(0, (Date.now() - ms) / 3600000);
    if (h < 1) { const m = Math.round(h * 60); return m <= 1 ? 'just now' : m + 'm ago'; }
    if (h < 24) return Math.round(h) + 'h ago';
    const d = Math.round(h / 24);
    return d === 1 ? '1d ago' : d + 'd ago';
  }

  pin() {
    return this.h('svg', { width: 13, height: 13, viewBox: '0 0 24 24', fill: 'none', stroke: '#5a7060', strokeWidth: 1.9, strokeLinecap: 'round', strokeLinejoin: 'round', 'aria-hidden': true }, this.h('path', { d: 'M12 21s-7-5.3-7-11a7 7 0 0 1 14 0c0 5.7-7 11-7 11z' }), this.h('circle', { cx: 12, cy: 10, r: 2.4 }));
  }

  deletedCard(t) {
    return this.h('a', { key: t.id, href: 'Thread.dc.html?id=' + encodeURIComponent(t.id), className: 'ak-topic-card', style: { textDecoration: 'none', display: 'block', background: '#ffffff', border: '1px dashed rgba(22,54,30,0.22)', borderRadius: 18, padding: '22px 26px', transition: 'transform .16s ease,border-color .16s ease' } },
      this.h('div', { style: { display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 } },
        this.h('span', { style: { display: 'inline-flex', fontSize: 12, fontWeight: 700, letterSpacing: 0.3, padding: '5px 11px', borderRadius: 999, background: '#eef3ec', color: '#8aa090', border: '1px solid rgba(22,54,30,0.12)' } }, 'Deleted')
      ),
      this.h('h3', { style: { fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 20, lineHeight: 1.25, color: '#8aa090', margin: '0 0 6px', fontStyle: 'italic' } }, '[deleted]'),
      this.h('p', { style: { fontSize: 14, color: '#8aa090', margin: 0 } }, 'This topic was deleted by its author — the discussion is still available.')
    );
  }

  topicCard(t) {
    if (t.deleted) return this.deletedCard(t);
    const dot = this.h('span', { style: { width: 3, height: 3, borderRadius: '50%', background: '#b6cdac', display: 'inline-block' } });
    const metaRow = this.h('div', { style: { display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', marginBottom: 12 } },
      this.h('span', { style: { display: 'inline-flex', alignItems: 'center', whiteSpace: 'nowrap', fontSize: 12, fontWeight: 700, letterSpacing: 0.3, padding: '5px 11px', borderRadius: 999, background: '#e3fbd8', color: '#16361e', border: '1px solid rgba(22,54,30,0.18)' } }, t.type || 'Question'),
      this.h('span', { style: { fontSize: 13, fontWeight: 600, color: '#5a7060' } }, t.category),
      (t.regionName && t.regionName !== '—') ? dot : null,
      (t.regionName && t.regionName !== '—') ? this.h('span', { style: { display: 'inline-flex', alignItems: 'center', gap: 5, fontSize: 13, color: '#5a7060' } }, this.pin(), t.regionName) : null,
      t.seekingProject ? this.h('span', { style: { display: 'inline-flex', alignItems: 'center', gap: 5, fontSize: 12, fontWeight: 700, color: '#0f2a16', background: '#8ee05e', borderRadius: 999, padding: '4px 10px' } }, 'Could become a project') : null
    );

    const footer = this.h('div', { style: { display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' } },
      this.h('span', { style: { fontSize: 13, color: '#5a7060' } }, (t.authorName || 'Member') + ' · ' + this.fmtActivity(t.createdAt)),
      ...(t.tags || []).slice(0, 4).map((tg) => this.h('span', { key: tg, style: { fontSize: 12, color: '#16361e', background: '#ffffff', border: '1px solid rgba(22,54,30,0.16)', borderRadius: 999, padding: '3px 9px' } }, tg))
    );

    const textCol = this.h('div', { style: { flex: '1 1 auto', minWidth: 0 } },
      this.h('h3', { style: { fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 23, lineHeight: 1.25, color: '#16361e', margin: '0 0 8px', overflowWrap: 'anywhere' } }, t.title),
      this.h('p', { style: { fontSize: 15, lineHeight: 1.55, color: '#4a5a4f', margin: '0 0 16px', overflowWrap: 'anywhere' } }, t.summary),
      footer
    );

    const thumb = (t.images && t.images[0]) ? this.h('div', { style: { flex: '0 0 auto', width: 104, height: 104, borderRadius: 14, overflow: 'hidden', border: '1px solid rgba(22,54,30,0.14)' } }, this.h('img', { src: t.images[0], alt: '', loading: 'lazy', style: { width: '100%', height: '100%', objectFit: 'cover', display: 'block' } })) : null;

    return this.h('a', { key: t.id, href: 'Thread.dc.html?id=' + encodeURIComponent(t.id), className: 'ak-topic-card', style: { textDecoration: 'none', display: 'block', background: '#ffffff', border: '1px solid rgba(22,54,30,0.13)', borderRadius: 18, padding: '24px 26px', transition: 'transform .16s ease,border-color .16s ease' } },
      metaRow,
      this.h('div', { style: { display: 'flex', gap: 18 } }, textCol, thumb)
    );
  }

  firstRunEmptyEl() {
    return this.h('div', { style: { background: '#ffffff', border: '1px dashed rgba(22,54,30,0.22)', borderRadius: 18, padding: '52px 26px', textAlign: 'center' } },
      this.h('h3', { style: { fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 22, color: '#16361e', margin: '0 0 8px' } }, 'No topics yet'),
      this.h('p', { style: { fontSize: 15, color: '#5a7060', margin: '0 0 22px' } }, 'Be the first to ask a question or share what worked on your farm.'),
      this.h('a', { href: 'CreatePost.dc.html', style: { display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8, minHeight: 50, padding: '0 24px', textDecoration: 'none', fontSize: 15, fontWeight: 700, color: '#eafbe1', background: '#16361e', borderRadius: 12 } },
        this.h('svg', { width: 17, height: 17, viewBox: '0 0 24 24', fill: 'none', stroke: '#eafbe1', strokeWidth: 1.9, strokeLinecap: 'round', strokeLinejoin: 'round' }, this.h('path', { d: 'M12 5v14M5 12h14' })),
        'Start the first topic')
    );
  }

  noMatchEl() {
    return this.h('div', { style: { background: '#ffffff', border: '1px dashed rgba(22,54,30,0.22)', borderRadius: 18, padding: '52px 26px', textAlign: 'center' } },
      this.h('h3', { style: { fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 22, color: '#16361e', margin: '0 0 8px' } }, 'No topics found'),
      this.h('p', { style: { fontSize: 15, color: '#5a7060', margin: 0 } }, 'Try a different category, region, or search term.')
    );
  }

  errorEl(msg) {
    return this.h('div', { style: { background: '#fde9e3', border: '1px solid rgba(254,76,36,0.28)', borderRadius: 18, padding: '24px 26px' } },
      this.h('h3', { style: { fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 20, color: '#c43a18', margin: '0 0 6px' } }, 'Topics can’t load from the database'),
      this.h('p', { style: { fontSize: 15, lineHeight: 1.55, color: '#8a3b22', margin: '0 0 8px' } }, 'Create the Firestore database and publish the security rules (see SETUP_FIREBASE.md).'),
      this.h('div', { style: { fontSize: 13, fontFamily: 'Ubuntu Mono, monospace', color: '#8a3b22', opacity: 0.8 } }, 'Details: ' + msg)
    );
  }

  buildTopicsEl(list) {
    const st = this.state;
    if (st.configured && st.topicsError) return this.errorEl(st.topicsError);
    if (st.remoteTopics === null) return this.h('div', { style: { padding: '40px 4px', fontSize: 16, color: '#5a7060' } }, 'Loading topics…');
    if (this.topics().length === 0) return this.firstRunEmptyEl();
    if (list.length === 0) return this.noMatchEl();
    return this.h(React.Fragment, null, ...list.map((t) => this.topicCard(t)));
  }

  renderVals() {
    const st = this.state;
    const DAY = 86400000;
    const source = this.topics()
      .filter((r) => !(r.deleted && !r.archived && r.deletedAt && (Date.now() - r.deletedAt > DAY)))
      .map((r) => ({
        id: r.id, title: r.title, summary: r.summary,
        category: r.category || 'General', region: r.regionId || '', regionName: r.region || '—',
        type: r.type, images: r.images || [], tags: r.tags || [], seekingProject: r.seekingProject,
        deleted: !!r.deleted, authorName: r.authorName, createdAt: r.createdAt || 0,
      }));

    const catCounts = {};
    source.forEach((t) => { catCounts[t.category] = (catCounts[t.category] || 0) + 1; });

    let list = source.filter((t) => {
      if (st.category !== 'all' && t.category !== st.category) return false;
      if (st.region !== 'all' && t.region !== st.region) return false;
      if (st.query.trim()) {
        const q = st.query.toLowerCase();
        const hay = [(t.title || ''), (t.summary || ''), (t.category || ''), (t.tags || []).join(' ')].join(' ').toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });

    list = list.slice().sort((a, b) => st.sort === 'oldest' ? a.createdAt - b.createdAt : b.createdAt - a.createdAt);

    const chipBase = 'display:flex;align-items:center;justify-content:space-between;width:100%;text-align:left;font-family:\'Ubuntu\',Arial,sans-serif;font-size:15px;border:none;border-radius:11px;padding:11px 13px;cursor:pointer;transition:background .15s ease;';
    const mkCat = (id, name, count) => {
      const active = st.category === id;
      return {
        name, count,
        style: chipBase + (active ? 'background:#16361e;color:#eafbe1;font-weight:600;' : 'background:transparent;color:#16361e;font-weight:500;'),
        countStyle: 'font-size:13px;' + (active ? 'color:#9fd587;' : 'color:#8aa090;'),
        onClick: () => this.setState({ category: id }),
      };
    };
    const catList = [mkCat('all', 'All topics', source.length)].concat(this.CATS.map((c) => mkCat(c, c, catCounts[c] || 0)));

    const sortBase = 'font-family:\'Ubuntu\',Arial,sans-serif;font-size:14px;font-weight:600;border:none;border-radius:999px;padding:9px 16px;cursor:pointer;white-space:nowrap;transition:background .15s ease;';
    const mkSort = (id, name) => {
      const active = st.sort === id;
      return { name, style: sortBase + (active ? 'background:#16361e;color:#eafbe1;' : 'background:transparent;color:#33473b;'), onClick: () => this.setState({ sort: id }) };
    };
    const sortList = [mkSort('latest', 'Latest'), mkSort('oldest', 'Oldest')];

    const modeBase = 'font-family:\'Ubuntu\',Arial,sans-serif;font-size:12px;font-weight:700;border:none;border-radius:999px;padding:6px 10px;cursor:pointer;line-height:1;';
    const mapMode = st.regionMode === 'map';
    const selectedRegionName = this.regionName(st.region);
    const regionSelected = st.region !== 'all';

    return {
      topicsEl: this.buildTopicsEl(list),
      catList,
      sortList,
      regionOpts: this.REGIONS,
      region: st.region,
      mapSelected: st.region,
      regionMapVisible: mapMode,
      regionTextVisible: !mapMode,
      mapToggleStyle: modeBase + (mapMode ? 'background:#16361e;color:#eafbe1;' : 'background:transparent;color:#16361e;'),
      textToggleStyle: modeBase + (!mapMode ? 'background:#16361e;color:#eafbe1;' : 'background:transparent;color:#16361e;'),
      regionHint: regionSelected ? 'Showing topics in ' + selectedRegionName + '.' : 'Tap a province to filter topics.',
      allRegionsLabel: regionSelected ? 'Clear region: ' + selectedRegionName : 'All regions',
      allRegionsStyle: 'width:100%;font-family:\'Ubuntu\',Arial,sans-serif;font-size:14px;font-weight:600;color:#16361e;background:' + (regionSelected ? '#ffffff' : '#e3fbd8') + ';border:1px solid rgba(22,54,30,0.18);border-radius:12px;padding:11px 13px;cursor:pointer;text-align:center;',
      showMapRegion: () => this.setState({ regionMode: 'map' }),
      showTextRegion: () => this.setState({ regionMode: 'text' }),
      onMapRegion: (id) => this.setState({ region: id }),
      clearRegion: () => this.setState({ region: 'all' }),
      query: st.query,
      onRegion: (e) => this.setState({ region: e.target.value }),
      onQuery: (e) => this.setState({ query: e.target.value }),
      resultLabel: (st.remoteTopics === null ? '' : list.length + (list.length === 1 ? ' topic' : ' topics')),
    };
  }
}
</script>
</body>
<style>
header{transition:opacity .28s ease,transform .28s ease,box-shadow .28s ease!important;}
html.hdr-off header{opacity:0!important;transform:translateY(-100%)!important;pointer-events:none!important;}
@media (max-width:820px){.ak-explore-grid{grid-template-columns:1fr!important;}}
</style>
<script>
(function(){
  var root=document.documentElement,lastY=0,ticking=false;
  window.addEventListener('scroll',function(){
    if(ticking)return;ticking=true;
    requestAnimationFrame(function(){
      var y=Math.max(0,window.scrollY||0),d=y-lastY;
      if(y<24||d<0)root.classList.remove('hdr-off');
      else if(y>96&&d>0)root.classList.add('hdr-off');
      lastY=y;ticking=false;
    });
  },{passive:true});
})();
</script>
</html>
