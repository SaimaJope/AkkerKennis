  select(id) {
    this.setState({ selected: id });
    if (typeof this.props.onSelect === 'function') this.props.onSelect(id);
  }

  renderProvince(p, selected, hovered, interactive) {
    const isSel = p.id === selected;
    const isHov = interactive && p.id === hovered && !isSel;
    const style = {
      fill: isSel ? '#8ee05e' : isHov ? '#b9e896' : '#d8f1c9',
      stroke: isSel ? '#16361e' : 'rgba(22,54,30,0.30)',
      strokeWidth: isSel ? 2 : 1.15,
      strokeLinecap: 'round',
      strokeLinejoin: 'round',
      cursor: interactive ? 'pointer' : 'default',
      outline: 'none',
      transition: 'fill .18s ease, stroke .18s ease, stroke-width .18s ease',
    };

    return React.createElement('path', {
      key: p.id,
      d: p.d,
      role: interactive ? 'button' : undefined,
      tabIndex: interactive ? 0 : undefined,
      'aria-label': p.name,
      'aria-pressed': interactive ? isSel : undefined,
      style,
      vectorEffect: 'non-scaling-stroke',
      onClick: interactive ? () => this.select(p.id) : undefined,
      onKeyDown: interactive ? (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          this.select(p.id);
        }
      } : undefined,
      onMouseEnter: interactive ? () => this.setState({ hovered: p.id }) : undefined,
      onMouseLeave: interactive ? () => this.setState({ hovered: null }) : undefined,
      onFocus: interactive ? () => this.setState({ hovered: p.id }) : undefined,
      onBlur: interactive ? () => this.setState({ hovered: null }) : undefined,
    });
  }

  renderVals() {
    const interactive = this.props.interactive !== false && this.props.interactive !== 'false';
    const hasSelectedProp = this.props.selected !== undefined && this.props.selected !== null && this.props.selected !== '';
    const rawSelected = hasSelectedProp ? this.props.selected : (this.state.selected !== undefined ? this.state.selected : 'drenthe');
    const selected = rawSelected === 'all' ? null : rawSelected;
    const hovered = this.state.hovered;
    const ordered = this.PROVS.slice().sort((a, b) => {
      const aw = a.id === selected ? 2 : a.id === hovered ? 1 : 0;
      const bw = b.id === selected ? 2 : b.id === hovered ? 1 : 0;
      return aw - bw;
    });

    const mapEl = React.createElement(
      'svg',
      {
        viewBox: '80 35 820 940',
        role: 'img',
        'aria-label': 'Map of the Netherlands by province',
        style: {
          width: '100%',
          maxWidth: 230,
          height: 'auto',
          display: 'block',
          overflow: 'visible',
        },
      },
      ordered.map((p) => this.renderProvince(p, selected, hovered, interactive))
    );

    const found = this.PROVS.find((p) => p.id === selected);
    return {
      mapEl,
      showCaption: this.props.showCaption === true || this.props.showCaption === 'true',
      selectedName: found ? found.name : '-',
    };
  }
