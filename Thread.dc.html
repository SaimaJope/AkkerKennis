<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mozilla+Text:wght@200..700&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,400;1,700&family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="assets/Favicon/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="assets/Favicon/favicon.svg" />
<link rel="shortcut icon" href="assets/Favicon/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="assets/Favicon/apple-touch-icon.png" />
<link rel="manifest" href="assets/Favicon/site.webmanifest" />
<script src="./gate.js"></script>
<script src="./theme.js"></script>
<script src="./firebase.js"></script>
<script src="./demo-data.js"></script>
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  ::selection{background:#8ee05e;color:#08100d;}
  textarea{font-family:'Ubuntu',Arial,sans-serif;}
  .forum-reply-vote:hover{border-color:#fe4c24;}
  .ak-gallery-img:hover{opacity:0.92;}
  .ak-author-link:hover{text-decoration:underline!important;}
</style>
</helmet>

<div style="background:#e3fbd8;min-height:100vh;font-family:'Ubuntu',Arial,sans-serif;color:#08100d;">
  <dc-import name="Header" active="explore" hint-size="100%,72px"></dc-import>

  <div style="background:#16361e;">{{ viewingBarEl }}</div>

  <section style="max-width:1120px;margin:0 auto;padding:clamp(24px,3vw,36px) clamp(20px,4vw,40px) clamp(48px,5vw,80px);">
    <a href="Explore.dc.html" style="display:inline-flex;align-items:center;gap:7px;text-decoration:none;font-size:15px;font-weight:600;color:#16361e;margin-bottom:22px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#16361e" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"></path></svg>
      All challenges
    </a>

    {{ bodyEl }}
  </section>

  <dc-import name="Footer" hint-size="100%,320px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{}">
class Component extends DCLogic {
  state = { configured: false, me: null, loggedIn: false, topicId: '', isDemo: false, topic: null, topicLoading: true, remoteReplies: null, repliesError: '', postError: '', posting: false, replyText: '', replyImages: [], threadStats: { boosts: [], issues: [] }, editingId: null, editText: '', showOriginal: {}, demoView: null, previewBoost: false, previewIssue: false, previewVotes: {}, reportOpen: false, reportReason: '', reported: false, prompt: false };

  h(type, props, ...children) {
    return React.createElement(type, props, ...children);
  }

  componentDidMount() {
    this._rImgSeq = 0;
    const configured = !!(window.AK && window.AK.isConfigured && window.AK.isConfigured());
    let topicId = '';
    try { topicId = new URLSearchParams(window.location.search).get('id') || ''; } catch (e) {}

    // Sample challenge from demo-data.js — the post itself (title/body) is a
    // client-side example, but boosting, reacting and commenting are REAL: they
    // use the live replies/threadStats collections keyed by the demo id, so they
    // work and persist just like a normal challenge. The sample's seed counts
    // are shown as a baseline on top of the real ones (see actionBarEl).
    if (window.AK_DEMO && window.AK_DEMO.isDemoId(topicId)) {
      const d = window.AK_DEMO.byId(topicId);
      this.setState({ configured, topicId, isDemo: true, topic: d, topicLoading: false });
      if (!configured) { this.setState({ remoteReplies: [] }); return; }
      window.AK.onAuth((u) => this.setState((s) => {
      const prevUid = s.me && s.me.uid; const newUid = u && u.uid;
      const next = { me: u, loggedIn: !!u, prompt: u ? false : s.prompt };
      // A real sign-in/out is authoritative — drop any demo preview override so
      // the page reflects reality. Ignore Firebase's repeat emissions for the
      // same user (it re-emits after enriching the profile), which must not
      // silently undo a presenter's toggle.
      if (prevUid !== newUid) { next.demoView = null; next.previewBoost = false; next.previewIssue = false; next.previewVotes = {}; }
      return next;
    }));
      this._unsub = window.AK.watchReplies(topicId, (rows, err) => {
        if (err) this.setState({ repliesError: err });
        else this.setState({ remoteReplies: rows, repliesError: '' });
      });
      this._unsubStats = window.AK.watchThreadStats(topicId, (stats) => { if (stats) this.setState({ threadStats: stats }); });
      return;
    }

    this.setState({ configured, topicId });
    if (!configured) { this.setState({ topicLoading: false }); return; }

    window.AK.onAuth((u) => this.setState((s) => {
      const prevUid = s.me && s.me.uid; const newUid = u && u.uid;
      const next = { me: u, loggedIn: !!u, prompt: u ? false : s.prompt };
      // A real sign-in/out is authoritative — drop any demo preview override so
      // the page reflects reality. Ignore Firebase's repeat emissions for the
      // same user (it re-emits after enriching the profile), which must not
      // silently undo a presenter's toggle.
      if (prevUid !== newUid) { next.demoView = null; next.previewBoost = false; next.previewIssue = false; next.previewVotes = {}; }
      return next;
    }));
    if (!topicId) { this.setState({ topicLoading: false }); return; }

    window.AK.getTopic(topicId)
      .then((t) => this.setState({ topic: t, topicLoading: false }))
      .catch((e) => { console.error(e); this.setState({ topicLoading: false }); });
    this._unsub = window.AK.watchReplies(topicId, (rows, err) => {
      if (err) this.setState({ repliesError: err });
      else this.setState({ remoteReplies: rows, repliesError: '' });
    });
    this._unsubStats = window.AK.watchThreadStats(topicId, (stats) => { if (stats) this.setState({ threadStats: stats }); });
  }

  componentWillUnmount() {
    if (this._unsub) this._unsub();
    if (this._unsubStats) this._unsubStats();
  }

  // During a live demo the presenter can preview the page as a signed-in member
  // or as a guest without really signing in/out — `demoView` overrides the real
  // auth state for everything the UI gates on (action bar, reply composer,
  // sign-up prompts). It is purely presentational: real boosts/comments still
  // need a real signed-in account to persist, so for the live actions to work
  // the presenter should sign in as a tester first.
  effLoggedIn() {
    if (this.state.demoView === 'user') return true;
    if (this.state.demoView === 'guest') return false;
    return this.state.loggedIn;
  }

  guarded(fn) {
    return () => { if (!this.effLoggedIn()) { this.setState({ prompt: true }); return; } fn(); };
  }

  avatarBg(seed) {
    const palette = ['#3d6b48', '#7a5e1f', '#16361e', '#4a5a4f', '#5a7060', '#2f5d3a'];
    let n = 0;
    for (let i = 0; i < String(seed).length; i++) n = (n + String(seed).charCodeAt(i)) % palette.length;
    return palette[n];
  }

  // Link to a member's public profile when we know their uid (and the post
  // isn't a [deleted] tombstone). Returns null when not linkable.
  profileHref(uid, name) {
    if (!uid || name === '[deleted]') return null;
    return 'Profile.dc.html?id=' + encodeURIComponent(uid);
  }

  // An avatar that becomes a clickable link to the author's profile when possible.
  authorAvatar(uid, name, initials, size, bg) {
    const style = { flex: '0 0 auto', width: size, height: size, borderRadius: '50%', background: bg || '#16361e', color: bg ? '#fff' : '#bff0a6', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: size >= 52 ? 20 : (size >= 46 ? 18 : 16), textDecoration: 'none', overflow: 'hidden' };
    const href = this.profileHref(uid, name);
    return href
      ? this.h('a', { href: href, 'aria-label': 'View ' + (name || 'member') + '’s profile', style: style }, initials || '?')
      : this.h('span', { style: style }, initials || '?');
  }

  // The author's name, linked to their profile when possible.
  authorNameEl(uid, name, fontSize) {
    const label = name || 'Member';
    const style = { fontSize: fontSize || 16, fontWeight: 600, color: '#16361e' };
    const href = this.profileHref(uid, name);
    return href
      ? this.h('a', { href: href, className: 'ak-author-link', style: Object.assign({ textDecoration: 'none' }, style) }, label)
      : this.h('div', { style: style }, label);
  }

  fmtTime(ms) {
    if (!ms) return 'just now';
    const mins = Math.max(0, Math.round((Date.now() - ms) / 60000));
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    const hrs = Math.round(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    return Math.round(hrs / 24) + 'd ago';
  }

  fmtTopicDate(ts) {
    let d = null;
    if (ts && ts.toDate) d = ts.toDate();
    else if (typeof ts === 'number') d = new Date(ts);
    if (!d) return 'just now';
    const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
  }

  icon(name, size = 16) {
    const common = { width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 1.9, strokeLinecap: 'round', strokeLinejoin: 'round', 'aria-hidden': true };
    const paths = {
      boost: [this.h('path', { key: 1, d: 'M12 4l6 7h-4v9h-4v-9H6z' })],
      shield: [this.h('path', { key: 1, d: 'M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z' })],
      alert: [this.h('circle', { key: 1, cx: 12, cy: 12, r: 9 }), this.h('path', { key: 2, d: 'M12 8v5M12 16h0' })],
      image: [this.h('rect', { key: 1, x: 4, y: 5, width: 16, height: 14, rx: 2 }), this.h('circle', { key: 2, cx: 9, cy: 10, r: 1.6 }), this.h('path', { key: 3, d: 'M20 15l-4.5-4.5L7 19' })],
      pin: [this.h('path', { key: 1, d: 'M12 21s-7-5.3-7-11a7 7 0 0 1 14 0c0 5.7-7 11-7 11z' }), this.h('circle', { key: 2, cx: 12, cy: 10, r: 2.4 })],
      flag: [this.h('path', { key: 1, d: 'M4 21V4h12l-1.5 4L16 12H4' })],
      check: [this.h('path', { key: 1, d: 'M20 6L9 17l-5-5' })],
    };
    return this.h('svg', common, ...(paths[name] || []));
  }

  // ── Replies ───────────────────────────────────────────────────────────────
  buildReplies() {
    const st = this.state;
    const uid = st.me && st.me.uid;
    const realAuthed = !!uid;
    return (st.remoteReplies || []).map((r) => {
      const prev = !realAuthed && !!st.previewVotes[r.id];
      return {
        id: r.id,
        uid: r.authorUid,
        name: r.authorName,
        initials: r.authorInitials,
        avatarBg: this.avatarBg(r.authorUid || r.authorName),
        meta: r.authorName + ' · ' + this.fmtTime(r.createdAt),
        body: r.body,
        images: r.images || [],
        count: r.votes.length + (prev ? 1 : 0),
        voted: realAuthed ? (r.votes.indexOf(uid) !== -1) : prev,
        mine: !!(uid && r.authorUid === uid),
        edited: r.edited,
        originalBody: r.originalBody,
        // Signed in → persist the vote. In the signed-out "User" demo preview
        // there is no account to write with, so toggle a local-only vote to keep
        // the button responsive on stage.
        onVote: this.guarded(() => realAuthed
          ? window.AK.toggleReplyVote(r.id).catch((e) => console.error(e))
          : this.setState((s) => ({ previewVotes: Object.assign({}, s.previewVotes, { [r.id]: !s.previewVotes[r.id] }) }))),
      };
    });
  }

  toggleOriginal(id) { this.setState((s) => ({ showOriginal: { ...s.showOriginal, [id]: !s.showOriginal[id] } })); }
  startEdit(r) { this.setState({ editingId: r.id, editText: r.body, postError: '' }); }
  cancelEdit() { this.setState({ editingId: null, editText: '' }); }
  saveEdit() {
    const id = this.state.editingId; const text = this.state.editText.trim();
    if (!id || !text) return;
    window.AK.editReply(id, text).then(() => this.setState({ editingId: null, editText: '' }))
      .catch((e) => { console.error(e); this.setState({ postError: (e && e.message) || 'Could not save the edit.' }); });
  }
  removeReply(r) {
    if (!window.confirm('Delete your comment? This cannot be undone.')) return;
    window.AK.deleteReply(r.id).catch((e) => { console.error(e); this.setState({ postError: (e && e.message) || 'Could not delete.' }); });
  }

  // ── Reply photo upload ────────────────────────────────────────────────────
  onPickReplyImages(fileList) {
    const files = Array.prototype.slice.call(fileList || []);
    const room = 2 - this.state.replyImages.length;
    files.slice(0, Math.max(0, room)).forEach((file) => {
      const id = ++this._rImgSeq;
      this.setState((s) => ({ replyImages: s.replyImages.concat([{ id, name: file.name, uploading: true, url: '', error: '' }]) }));
      window.AK.uploadImage(file, 'replies')
        .then((url) => this.setState((s) => ({ replyImages: s.replyImages.map((im) => im.id === id ? Object.assign({}, im, { url, uploading: false }) : im) })))
        .catch((e) => { console.error(e); this.setState((s) => ({ replyImages: s.replyImages.map((im) => im.id === id ? Object.assign({}, im, { uploading: false, error: (e && e.message) || 'Upload failed' }) : im) })); });
    });
  }
  removeReplyImage(id) { this.setState((s) => ({ replyImages: s.replyImages.filter((im) => im.id !== id) })); }
  anyReplyUploading() { return this.state.replyImages.some((im) => im.uploading); }
  uploadedReplyUrls() { return this.state.replyImages.filter((im) => im.url && !im.error).map((im) => im.url); }

  postReply() {
    const text = this.state.replyText.trim();
    if ((!text && !this.uploadedReplyUrls().length) || this.state.posting) return;
    if (!this.state.topicId) return;
    if (this.anyReplyUploading()) { this.setState({ postError: 'Hang on — your photo is still uploading.' }); return; }
    this.setState({ posting: true, postError: '' });
    window.AK.addReply(this.state.topicId, text, this.uploadedReplyUrls())
      .then(() => this.setState({ replyText: '', replyImages: [], posting: false, postError: '' }))
      .catch((e) => { console.error(e); this.setState({ posting: false, postError: (e && e.message) || 'Could not post your comment.' }); });
  }

  // ── Topic header ──────────────────────────────────────────────────────────
  galleryEl(images, folder) {
    if (!images || !images.length) return null;
    return this.h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(150px,1fr))', gap: 10, marginTop: 18 } },
      ...images.map((src, i) => this.h('a', { key: i, href: src, target: '_blank', rel: 'noreferrer', style: { display: 'block', height: 170, borderRadius: 14, overflow: 'hidden', border: '1px solid rgba(22,54,30,0.14)' } },
        this.h('img', { src: src, alt: '', loading: 'lazy', className: 'ak-gallery-img', style: { width: '100%', height: '100%', objectFit: 'cover', display: 'block', transition: 'opacity .15s ease' } })
      ))
    );
  }

  DAY = 86400000;

  deletedMs(t) { const x = t.deletedAt; if (x && x.toMillis) return x.toMillis(); return typeof x === 'number' ? x : 0; }
  topicHidden(t) { return !!(t && t.deleted && !t.archived && this.deletedMs(t) && (Date.now() - this.deletedMs(t) > this.DAY)); }
  hoursLeft(t) { const ms = this.deletedMs(t); if (!ms) return 24; return Math.max(0, Math.round(24 - (Date.now() - ms) / 3600000)); }
  isMine(t) { const me = this.state.me; return !!(me && t && t.authorUid && t.authorUid === me.uid); }

  reloadTopic() { window.AK.getTopic(this.state.topicId).then((t) => this.setState({ topic: t })).catch((e) => console.error(e)); }
  deleteTopic() {
    if (!window.confirm('Delete this challenge? The title and photos are removed; the comments stay. It disappears from the site after 24 hours unless you archive it.')) return;
    window.AK.softDeleteTopic(this.state.topicId).then(() => this.reloadTopic()).catch((e) => { console.error(e); window.alert((e && e.message) || 'Could not delete.'); });
  }
  archiveTopic() {
    window.AK.setTopicArchived(this.state.topicId, true).then(() => this.reloadTopic()).catch((e) => { console.error(e); window.alert((e && e.message) || 'Could not archive.'); });
  }

  renderDeletedTopic(t) {
    const badge = this.h('div', { style: { display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14 } },
      this.h('span', { style: { display: 'inline-flex', fontSize: 12, fontWeight: 700, padding: '5px 11px', borderRadius: 999, background: '#eef3ec', color: '#8aa090', border: '1px solid rgba(22,54,30,0.12)' } }, 'Deleted'));
    const title = this.h('h1', { style: { fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 'clamp(28px,3.6vw,40px)', lineHeight: 1.12, color: '#8aa090', margin: '0 0 18px', fontStyle: 'italic' } }, '[deleted]');
    const author = this.h('div', { style: { display: 'flex', alignItems: 'center', gap: 13, marginBottom: 20 } },
      this.h('span', { style: { flex: '0 0 auto', width: 46, height: 46, borderRadius: '50%', background: '#cfe0c8', color: '#5a7060', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 18 } }, '–'),
      this.h('div', null,
        this.h('div', { style: { fontSize: 16, fontWeight: 600, color: '#8aa090' } }, '[deleted]'),
        this.h('div', { style: { fontSize: 14, color: '#8aa090' } }, 'Posted ' + this.fmtTopicDate(t.createdAt))
      ));
    const bodyCard = this.h('div', { style: { background: '#ffffff', border: '1px dashed rgba(22,54,30,0.22)', borderRadius: 20, padding: 'clamp(24px,3vw,36px)' } },
      this.h('p', { style: { fontSize: 16, lineHeight: 1.7, color: '#8aa090', margin: 0 } }, 'This challenge was deleted by its author. The comments below are kept.'));
    return this.h(React.Fragment, null, badge, title, author, bodyCard);
  }

  ownerBarEl(t) {
    if (!this.isMine(t) || !t.deleted) return null;
    if (t.archived) {
      return this.h('div', { style: { display: 'flex', alignItems: 'center', gap: 9, margin: '18px 0', padding: '12px 16px', background: '#e3fbd8', border: '1px solid rgba(22,54,30,0.14)', borderRadius: 12, fontSize: 14, color: '#16361e' } }, 'Archived — this discussion is kept permanently.');
    }
    const hrs = this.hoursLeft(t);
    return this.h('div', { style: { margin: '18px 0', padding: '16px 18px', background: '#16361e', borderRadius: 14, color: '#dbeede' } },
      this.h('div', { style: { fontSize: 14, lineHeight: 1.55, marginBottom: 12 } }, 'You deleted this challenge. It and its comments will be removed from the site ' + (hrs > 0 ? ('in about ' + hrs + ' hour' + (hrs === 1 ? '' : 's')) : 'shortly') + ' — unless you archive it.'),
      this.h('button', { type: 'button', onClick: () => this.archiveTopic(), style: { display: 'inline-flex', alignItems: 'center', justifyContent: 'center', minHeight: 44, padding: '0 20px', fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 14, fontWeight: 700, color: '#0f2a16', background: '#8ee05e', border: 'none', borderRadius: 11, cursor: 'pointer' } }, 'Archive to keep the discussion'));
  }

  removedEl() {
    return this.h('div', { style: { background: '#ffffff', border: '1px dashed rgba(22,54,30,0.22)', borderRadius: 18, padding: '52px 26px', textAlign: 'center' } },
      this.h('h1', { style: { fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 26, color: '#16361e', margin: '0 0 8px' } }, 'Challenge removed'),
      this.h('p', { style: { fontSize: 16, color: '#5a7060', margin: '0 0 22px' } }, 'This challenge was deleted by its author and is no longer available.'),
      this.h('a', { href: 'Explore.dc.html', style: { display: 'inline-flex', alignItems: 'center', justifyContent: 'center', minHeight: 48, padding: '0 24px', textDecoration: 'none', fontSize: 15, fontWeight: 700, color: '#eafbe1', background: '#16361e', borderRadius: 12 } }, 'View all challenges'));
  }

  renderTopic(t) {
    if (t.deleted) return this.renderDeletedTopic(t);
    const dot = this.h('span', { style: { width: 3, height: 3, borderRadius: '50%', background: '#b6cdac', display: 'inline-block' } });
    const metaRow = this.h('div', { style: { display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', marginBottom: 14 } },
      this.h('span', { style: { display: 'inline-flex', alignItems: 'center', whiteSpace: 'nowrap', fontSize: 12, fontWeight: 700, letterSpacing: 0.3, padding: '5px 11px', borderRadius: 999, background: '#8ee05e', color: '#0f2a16' } }, t.type || 'Question'),
      t.category ? this.h('span', { style: { fontSize: 13, fontWeight: 600, color: '#5a7060' } }, t.category) : null,
      t.region ? dot : null,
      t.region ? this.h('span', { style: { display: 'inline-flex', alignItems: 'center', gap: 5, fontSize: 13, color: '#5a7060' } }, this.icon('pin', 13), t.region) : null
    );
    const title = this.h('h1', { style: { fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 'clamp(30px,3.8vw,44px)', lineHeight: 1.12, color: '#16361e', margin: '0 0 18px', letterSpacing: '-0.4px', overflowWrap: 'anywhere' } }, t.title || 'Untitled challenge');
    const author = this.h('div', { style: { display: 'flex', alignItems: 'center', gap: 13, marginBottom: 20 } },
      this.authorAvatar(t.authorUid, t.authorName, t.authorInitials, 46),
      this.h('div', null,
        this.authorNameEl(t.authorUid, t.authorName, 16),
        this.h('div', { style: { fontSize: 14, color: '#5a7060' } }, (t.region ? t.region + ' · ' : '') + 'Posted ' + this.fmtTopicDate(t.createdAt))
      )
    );
    const tags = (t.tags && t.tags.length)
      ? this.h('div', { style: { display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 20 } }, ...t.tags.map((tg) => this.h('span', { key: tg, style: { fontSize: 13, color: '#16361e', background: '#ffffff', border: '1px solid rgba(22,54,30,0.16)', borderRadius: 999, padding: '5px 12px' } }, tg)))
      : null;

    const bodyChildren = [];
    (t.body || '').split(/\n\n+/).filter(Boolean).forEach((p, i) => bodyChildren.push(this.h('p', { key: 'p' + i, style: { fontSize: 17, lineHeight: 1.7, color: '#26352c', margin: '0 0 18px', overflowWrap: 'anywhere' } }, p)));
    if (t.tried) {
      bodyChildren.push(this.h('h3', { key: 'th', style: { fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 21, color: '#16361e', margin: '28px 0 12px' } }, 'What I have tried'));

      ? (realName ? ('Viewing as ' + realName) : 'Viewing as a member · preview')
      : 'Browsing as a guest — sign in to reply and boost';
    // "Show as" demo toggle — flips the page between the member and guest views
    // so the experience can be demonstrated without signing in and out.
    const seg = (label, view, active) => this.h('button', {
      type: 'button', 'aria-pressed': active,
      onClick: () => this.setState({ demoView: view, prompt: false, reportOpen: false, reported: false, reportReason: '', previewBoost: false, previewIssue: false, previewVotes: {} }),
      style: { fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 13, fontWeight: 700, border: 'none', borderRadius: 999, padding: '6px 14px', cursor: 'pointer', transition: 'all .15s ease', background: active ? '#8ee05e' : 'transparent', color: active ? '#0f2a16' : '#cfe6d2' },
    }, label);
    const toggle = this.h('div', { role: 'group', 'aria-label': 'Preview this page as', style: { display: 'inline-flex', alignItems: 'center', gap: 4, padding: 4, background: 'rgba(255,255,255,0.07)', border: '1px solid rgba(255,255,255,0.16)', borderRadius: 999 } },
      this.h('span', { style: { fontSize: 12, fontWeight: 600, color: '#9fc2a6', padding: '0 4px 0 8px' } }, 'Show as'),
      seg('User', 'user', eff),
      seg('Guest', 'guest', !eff)
    );
    const authStyle = { fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 13, fontWeight: 600, color: '#cfe6d2', background: 'transparent', border: '1px solid rgba(255,255,255,0.2)', borderRadius: 999, padding: '7px 15px', cursor: 'pointer', textDecoration: 'none', display: 'inline-block' };
    const auth = realName
      ? this.h('button', { type: 'button', onClick: () => window.AK.signOut(), style: authStyle }, 'Sign out')
      : this.h('a', { href: 'SignIn.dc.html', style: authStyle }, 'Sign in');
    return this.h('div', { style: { maxWidth: 1120, margin: '0 auto', padding: '11px clamp(20px,4vw,40px)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 14, flexWrap: 'wrap' } },
      this.h('span', { style: { display: 'inline-flex', alignItems: 'center', gap: 9, fontSize: 14, color: '#cfe6d2' } },
        this.h('span', { style: { width: 8, height: 8, borderRadius: '50%', background: eff ? '#8ee05e' : '#c9a24a', display: 'inline-block' } }),
        statusText
      ),
      this.h('div', { style: { display: 'inline-flex', alignItems: 'center', gap: 10, flexWrap: 'wrap' } }, toggle, auth)
    );
  }

  sidebarEl(t) {
    const detailRow = (label, value, color) => value ? this.h('div', { style: { display: 'flex', justifyContent: 'space-between', gap: 14, fontSize: 14 } },
      this.h('span', { style: { color: '#5a7060', flex: '0 0 auto' } }, label),
      this.h('span', { style: { color: color || '#16361e', fontWeight: 600, textAlign: 'right' } }, value)
    ) : null;

    const authorCard = this.h('div', { style: { background: '#ffffff', border: '1px solid rgba(22,54,30,0.13)', borderRadius: 18, padding: 22 } },
      this.h('h3', { style: { fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 12, fontWeight: 700, letterSpacing: 1, textTransform: 'uppercase', color: '#5a7060', margin: '0 0 16px' } }, 'Posted by'),
      this.h('div', { style: { display: 'flex', alignItems: 'center', gap: 13 } },
        this.authorAvatar(t.authorUid, t.authorName, t.authorInitials, 52),
        this.h('div', null,
          this.authorNameEl(t.authorUid, t.authorName, 16),
          this.h('div', { style: { fontSize: 14, color: '#5a7060' } }, t.region ? ('Arable farmer · ' + t.region) : 'AkkerBooster member')
        )
      )
    );

    const detailsCard = this.h('div', { style: { background: '#ffffff', border: '1px solid rgba(22,54,30,0.13)', borderRadius: 18, padding: 22 } },
      this.h('h3', { style: { fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 12, fontWeight: 700, letterSpacing: 1, textTransform: 'uppercase', color: '#5a7060', margin: '0 0 16px' } }, 'Challenge details'),
      this.h('div', { style: { display: 'flex', flexDirection: 'column', gap: 13 } },
        detailRow('Type', t.type),
        detailRow('Category', t.category),
        detailRow('Region', t.region),
        detailRow('Crop', t.crop),
        detailRow('Posted', this.fmtTopicDate(t.createdAt)),
        t.seekingProject ? detailRow('Status', 'Project candidate', '#fe4c24') : null
      )
    );

    return this.h('aside', { className: 'ak-detail-side', style: { display: 'flex', flexDirection: 'column', gap: 18 } }, authorCard, detailsCard);
  }

  sampleBannerEl() {
    return this.h('div', { style: { display: 'flex', alignItems: 'center', gap: 10, background: '#16361e', color: '#dbeede', borderRadius: 14, padding: '12px 16px', marginBottom: 22, fontSize: 14, lineHeight: 1.5 } },
      this.h('span', { style: { width: 8, height: 8, borderRadius: '50%', background: '#8ee05e', display: 'inline-block', flex: '0 0 auto' } }),
      'Sample challenge — added to show how AkkerBooster works. The post is an example, but you can boost it, react, and comment for real.'
    );
  }

  bodyEl() {
    const st = this.state;
    if (st.topicLoading) return this.h('div', { style: { padding: '30px 0', fontSize: 16, color: '#5a7060' } }, 'Loading challenge…');
    const t = st.topic;
    if (!t) return this.notFoundEl();
    if (this.topicHidden(t)) return this.removedEl();
    return this.h('div', { className: 'ak-detail-grid', style: { display: 'grid', gridTemplateColumns: '1fr 312px', gap: 32, alignItems: 'start' } },
      this.h('div', null,
        st.isDemo ? this.sampleBannerEl() : null,
        this.renderTopic(t),
        st.isDemo ? null : this.ownerBarEl(t),
        t.deleted ? null : this.actionBarEl(t),
        t.deleted ? null : this.reportPanelEl(),
        this.promptEl(),
        t.deleted ? null : this.h('div', { style: { height: 24 } }),
        t.deleted ? null : this.projectPanelEl(t),
        this.repliesSectionEl(),
        this.replyGateEl()
      ),
      this.sidebarEl(t)
    );
  }

  renderVals() {
    return { viewingBarEl: this.viewingBarEl(), bodyEl: this.bodyEl() };
  }
}
</script>
</body>
<style>
header{transition:opacity .28s ease,transform .28s ease,box-shadow .28s ease!important;}
html.hdr-off header{opacity:0!important;transform:translateY(-100%)!important;pointer-events:none!important;}
@media (max-width:820px){.ak-detail-grid{grid-template-columns:1fr!important;}}
</style>
<script>
(function(){
  var root=document.documentElement,lastY=0,ticking=false;
  window.addEventListener('scroll',function(){
    if(ticking)return;ticking=true;
    requestAnimationFrame(function(){
      var y=Math.max(0,window.scrollY||0),d=y-lastY;
      if(y<24||d<0)root.classList.remove('hdr-off');
      else if(y>96&&d>0)root.classList.add('hdr-off');
      lastY=y;ticking=false;
    });
  },{passive:true});
})();
</script>
</html>
