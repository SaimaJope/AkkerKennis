<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mozilla+Text:wght@200..700&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,400;1,700&family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="assets/Favicon/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="assets/Favicon/favicon.svg" />
<link rel="shortcut icon" href="assets/Favicon/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="assets/Favicon/apple-touch-icon.png" />
<link rel="manifest" href="assets/Favicon/site.webmanifest" />
<script src="./gate.js"></script>
<script src="./theme.js"></script>
<script src="./firebase.js"></script>
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  ::selection{background:#8ee05e;color:#08100d;}
  textarea{font-family:'Ubuntu',Arial,sans-serif;}
  .ak-whatsapp:hover{background:#7bd24c;}
  .forum-reply-vote:hover{border-color:#fe4c24;}
</style>
</helmet>

<div style="background:#e3fbd8;min-height:100vh;font-family:'Ubuntu',Arial,sans-serif;color:#08100d;">
  <dc-import name="Header" active="projects" hint-size="100%,72px"></dc-import>

  <div style="background:#16361e;">{{ viewingBarEl }}</div>

  <section style="max-width:1120px;margin:0 auto;padding:clamp(24px,3vw,36px) clamp(20px,4vw,40px) clamp(48px,5vw,80px);">
    {{ bodyEl }}
  </section>

  <dc-import name="Footer" hint-size="100%,320px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{}">
class Component extends DCLogic {
  state = { configured: false, me: null, loggedIn: false, projectId: '', pr: null, prLoading: true, remoteReplies: null, repliesError: '', postError: '', posting: false, replyText: '', threadStats: { boosts: [], issues: [] }, editingId: null, editText: '', showOriginal: {}, prompt: false };

  h(type, props, ...children) {
    return React.createElement(type, props, ...children);
  }

  componentDidMount() {
    const configured = !!(window.AK && window.AK.isConfigured && window.AK.isConfigured());
    let projectId = '';
    try { projectId = new URLSearchParams(window.location.search).get('id') || ''; } catch (e) {}
    this.setState({ configured, projectId });
    if (!configured) { this.setState({ prLoading: false }); return; }

    window.AK.onAuth((u) => this.setState({ me: u, loggedIn: !!u, prompt: u ? false : this.state.prompt }));
    if (projectId) {
      window.AK.getProject(projectId)
        .then((pr) => this.setState({ pr, prLoading: false }))
        .catch((e) => { console.error(e); this.setState({ prLoading: false }); });
      this._unsub = window.AK.watchReplies(projectId, (rows, err) => {
        if (err) this.setState({ repliesError: err });
        else this.setState({ remoteReplies: rows, repliesError: '' });
      });
      this._unsubStats = window.AK.watchThreadStats(projectId, (stats) => { if (stats) this.setState({ threadStats: stats }); });
    } else {
      this.setState({ prLoading: false });
    }
  }

  componentWillUnmount() {
    if (this._unsub) this._unsub();
    if (this._unsubStats) this._unsubStats();
  }

  statusLabel(status) { return status === 'past' ? 'Past project' : 'Ongoing project'; }

  guarded(fn) {
    return () => { if (!this.state.loggedIn) { this.setState({ prompt: true }); return; } fn(); };
  }

  avatarBg(seed) {
    const palette = ['#3d6b48', '#7a5e1f', '#16361e', '#4a5a4f', '#5a7060', '#2f5d3a'];
    let n = 0;
    for (let i = 0; i < String(seed).length; i++) n = (n + String(seed).charCodeAt(i)) % palette.length;
    return palette[n];
  }

  fmtTime(ms) {
    if (!ms) return 'just now';
    const mins = Math.max(0, Math.round((Date.now() - ms) / 60000));
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    const hrs = Math.round(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    return Math.round(hrs / 24) + 'd ago';
  }

  icon(name, size = 16) {
    const common = { width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 1.9, strokeLinecap: 'round', strokeLinejoin: 'round', 'aria-hidden': true };
    const paths = {
      boost: [this.h('path', { key: 1, d: 'M12 4l6 7h-4v9h-4v-9H6z' })],
    };
    return this.h('svg', common, ...(paths[name] || []));
  }

  // ── Replies (shared with the topic thread system) ─────────────────────────
  buildReplies() {
    const st = this.state;
    const uid = st.me && st.me.uid;
    return (st.remoteReplies || []).map((r) => ({
      id: r.id,
      name: r.authorName,
      initials: r.authorInitials,
      avatarBg: this.avatarBg(r.authorUid || r.authorName),
      meta: r.authorName + ' · ' + this.fmtTime(r.createdAt),
      body: r.body,
      count: r.votes.length,
      voted: !!(uid && r.votes.indexOf(uid) !== -1),
      mine: !!(uid && r.authorUid === uid),
      edited: r.edited,
      originalBody: r.originalBody,
      onVote: this.guarded(() => { window.AK.toggleReplyVote(r.id).catch((e) => console.error(e)); }),
    }));
  }

  toggleOriginal(id) { this.setState((s) => ({ showOriginal: { ...s.showOriginal, [id]: !s.showOriginal[id] } })); }
  startEdit(r) { this.setState({ editingId: r.id, editText: r.body, postError: '' }); }
  cancelEdit() { this.setState({ editingId: null, editText: '' }); }
  saveEdit() {
    const id = this.state.editingId; const text = this.state.editText.trim();
    if (!id || !text) return;
    window.AK.editReply(id, text).then(() => this.setState({ editingId: null, editText: '' }))
      .catch((e) => { console.error(e); this.setState({ postError: (e && e.message) || 'Could not save the edit.' }); });
  }
  removeReply(r) {
    if (!window.confirm('Delete your comment? This cannot be undone.')) return;
    window.AK.deleteReply(r.id).catch((e) => { console.error(e); this.setState({ postError: (e && e.message) || 'Could not delete.' }); });
  }
  postReply() {
    const text = this.state.replyText.trim();
    if (!text || this.state.posting) return;
    if (!this.state.projectId) return;
    this.setState({ posting: true, postError: '' });
    window.AK.addReply(this.state.projectId, text)
      .then(() => this.setState({ replyText: '', posting: false, postError: '' }))
      .catch((e) => { console.error(e); this.setState({ posting: false, postError: (e && e.message) || 'Could not post your comment.' }); });
  }

  replyActionStyle(color) {
    return { display: 'inline-flex', alignItems: 'center', gap: 5, fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 13, fontWeight: 600, color: color || '#5a7060', background: 'transparent', border: 'none', padding: 0, cursor: 'pointer' };
  }

  replyBody(r) {
    if (this.state.editingId === r.id) {
      return this.h('div', null,
        this.h('textarea', { value: this.state.editText, onInput: (e) => this.setState({ editText: e.target.value }), rows: 3, style: { width: '100%', fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 16, lineHeight: 1.6, color: '#08100d', background: '#f6fcf0', border: '1px solid rgba(22,54,30,0.16)', borderRadius: 12, padding: '12px 14px', resize: 'vertical' } }),
        this.h('div', { style: { display: 'flex', gap: 8, marginTop: 10 } },
          this.h('button', { type: 'button', onClick: () => this.saveEdit(), style: { minHeight: 40, padding: '0 16px', fontSize: 14, fontWeight: 600, color: '#eafbe1', background: '#16361e', border: 'none', borderRadius: 10, cursor: 'pointer' } }, 'Save'),
          this.h('button', { type: 'button', onClick: () => this.cancelEdit(), style: { minHeight: 40, padding: '0 16px', fontSize: 14, fontWeight: 600, color: '#16361e', background: 'transparent', border: '1.5px solid rgba(22,54,30,0.22)', borderRadius: 10, cursor: 'pointer' } }, 'Cancel')
        )
      );
    }
    const showing = !!this.state.showOriginal[r.id];
    const editedRow = r.edited ? this.h('div', { style: { marginTop: 8 } },
      this.h('span', { style: { fontSize: 12, color: '#8aa090', fontStyle: 'italic' } }, 'edited'),
      this.h('button', { type: 'button', onClick: () => this.toggleOriginal(r.id), style: { marginLeft: 10, fontSize: 12, fontWeight: 600, color: '#5a7060', background: 'transparent', border: 'none', padding: 0, cursor: 'pointer', textDecoration: 'underline' } }, showing ? 'Hide original' : 'Show original'),
      showing ? this.h('div', { style: { marginTop: 8, padding: '10px 12px', background: '#f6fcf0', border: '1px solid rgba(22,54,30,0.12)', borderRadius: 10 } },
        this.h('span', { style: { display: 'block', fontSize: 11, fontWeight: 700, letterSpacing: 0.5, textTransform: 'uppercase', color: '#8aa090', marginBottom: 4 } }, 'Original'),
        this.h('span', { style: { fontSize: 14, lineHeight: 1.55, color: '#5a7060' } }, r.originalBody || '(empty)')
      ) : null
    ) : null;

    return this.h(React.Fragment, null,
      this.h('p', { style: { fontSize: 16, lineHeight: 1.65, color: '#26352c', margin: 0 } }, r.body),
      editedRow,
      r.mine ? this.h('div', { style: { display: 'flex', gap: 16, marginTop: 12 } },
        this.h('button', { type: 'button', onClick: () => this.startEdit(r), style: this.replyActionStyle() }, 'Edit'),
        this.h('button', { type: 'button', onClick: () => this.removeReply(r), style: this.replyActionStyle('#c43a18') }, 'Delete')
      ) : null
    );
  }

  replyCard(r) {
    return this.h('div', { key: r.id, style: { background: '#ffffff', border: '1px solid rgba(22,54,30,0.13)', borderRadius: 18, padding: '22px 24px' } },
      this.h('div', { style: { display: 'flex', alignItems: 'center', gap: 12, marginBottom: 12 } },
        this.h('span', { style: { flex: '0 0 auto', width: 40, height: 40, borderRadius: '50%', background: r.avatarBg, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 16 } }, r.initials),
        this.h('div', { style: { flex: '1 1 auto' } },
          this.h('div', { style: { fontSize: 15, fontWeight: 600, color: '#16361e' } }, r.name),
          this.h('div', { style: { fontSize: 13, color: '#5a7060' } }, r.meta)
        ),
        this.h('button', { type: 'button', onClick: r.onVote, 'aria-pressed': r.voted, className: 'forum-reply-vote', style: { display: 'inline-flex', alignItems: 'center', gap: 6, flex: '0 0 auto', fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 14, fontWeight: 600, borderRadius: 999, padding: '7px 13px', cursor: 'pointer', transition: 'all .15s ease', background: r.voted ? '#fe4c24' : '#ffffff', color: r.voted ? '#ffffff' : '#fe4c24', border: '1.5px solid ' + (r.voted ? '#fe4c24' : 'rgba(254,76,36,0.4)') } }, this.icon('boost', 15), r.count)
      ),
      this.replyBody(r)
    );
  }

  repliesSectionEl() {
    const st = this.state;
    const replies = this.buildReplies();
    if (st.repliesError) {
      return this.h('div', { style: { marginTop: 36 } },
        this.h('h2', { style: { fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 26, color: '#16361e', margin: '0 0 20px' } }, 'Discussion'),
        this.h('div', { style: { background: '#fde9e3', border: '1px solid rgba(254,76,36,0.28)', borderRadius: 16, padding: '20px 22px' } },
          this.h('div', { style: { fontSize: 17, fontWeight: 700, color: '#c43a18', marginBottom: 6 } }, 'Comments can’t load from the database'),
          this.h('div', { style: { fontSize: 15, lineHeight: 1.55, color: '#8a3b22', marginBottom: 10 } }, 'Create the Firestore database and publish the security rules (see SETUP_FIREBASE.md). Once published, comments and upvotes work instantly.'),
          this.h('div', { style: { fontSize: 13, fontFamily: 'Ubuntu Mono, monospace', color: '#8a3b22', opacity: 0.8 } }, 'Details: ' + st.repliesError)
        )
      );
    }
    const heading = st.remoteReplies === null ? 'Loading discussion…' : replies.length + (replies.length === 1 ? ' comment' : ' comments');
    return this.h('div', { style: { marginTop: 36 } },
      this.h('h2', { style: { fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 26, color: '#16361e', margin: '0 0 20px' } }, heading),
      replies.length
        ? this.h('div', { style: { display: 'flex', flexDirection: 'column', gap: 16, marginBottom: 24 } }, ...replies.map((r) => this.replyCard(r)))
        : this.h('div', { style: { background: '#ffffff', border: '1px dashed rgba(22,54,30,0.22)', borderRadius: 18, padding: '32px 24px', marginBottom: 24, textAlign: 'center', fontSize: 15, color: '#5a7060' } }, 'No comments yet — ask how to take part or share a relevant result.'),
      this.replyGateEl()
    );
  }

  replyGateEl() {
    const st = this.state;
    if (st.loggedIn) {
      return this.h('div', { style: { background: '#ffffff', border: '1px solid rgba(22,54,30,0.13)', borderRadius: 18, padding: '22px 24px' } },
        this.h('div', { style: { display: 'flex', alignItems: 'center', gap: 12, marginBottom: 14 } },
          this.h('span', { style: { flex: '0 0 auto', width: 40, height: 40, borderRadius: '50%', background: '#16361e', color: '#bff0a6', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 16 } }, st.me ? st.me.initials : '?'),
          this.h('span', { style: { fontSize: 15, fontWeight: 600, color: '#16361e' } }, 'Write a comment')
        ),
        this.h('textarea', { value: st.replyText, onInput: (e) => this.setState({ replyText: e.target.value }), placeholder: 'Ask how to take part or share your experience...', rows: 4, style: { width: '100%', fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 16, lineHeight: 1.6, color: '#08100d', background: '#f6fcf0', border: '1px solid rgba(22,54,30,0.16)', borderRadius: 12, padding: '14px 16px', resize: 'vertical' } }),
        this.h('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'flex-end', gap: 12, marginTop: 14 } },
          this.h('button', { type: 'button', onClick: () => this.postReply(), style: { display: 'inline-flex', alignItems: 'center', justifyContent: 'center', minHeight: 48, padding: '0 24px', fontSize: 15, fontWeight: 600, color: '#eafbe1', background: '#16361e', border: 'none', borderRadius: 12, cursor: st.posting ? 'default' : 'pointer', opacity: st.posting ? 0.7 : 1 } }, st.posting ? 'Posting…' : 'Post comment')
        ),
        st.postError ? this.h('div', { style: { marginTop: 12, fontSize: 14, color: '#c43a18', background: '#fde9e3', border: '1px solid rgba(254,76,36,0.28)', borderRadius: 10, padding: '10px 12px' } }, st.postError) : null
      );
    }
    return this.h('div', { style: { background: '#ffffff', border: '1px solid rgba(22,54,30,0.16)', borderRadius: 18, padding: 'clamp(26px,3vw,38px)', textAlign: 'center' } },
      this.h('h3', { style: { fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 24, color: '#16361e', margin: '0 0 8px' } }, 'Sign up to join the discussion.'),
      this.h('p', { style: { fontSize: 16, color: '#5a7060', margin: '0 0 22px' } }, 'You can read everything freely. Create a free account to comment and ask how to take part.'),
      this.h('div', { style: { display: 'flex', gap: 12, justifyContent: 'center', flexWrap: 'wrap' } },
        this.h('a', { href: 'SignUp.dc.html', style: { display: 'inline-flex', alignItems: 'center', justifyContent: 'center', minHeight: 50, padding: '0 26px', textDecoration: 'none', fontSize: 16, fontWeight: 600, color: '#eafbe1', background: '#16361e', borderRadius: 12 } }, 'Create account'),
        this.h('a', { href: 'SignIn.dc.html', style: { display: 'inline-flex', alignItems: 'center', justifyContent: 'center', minHeight: 50, padding: '0 26px', textDecoration: 'none', fontSize: 16, fontWeight: 600, color: '#16361e', background: 'transparent', border: '1.5px solid rgba(22,54,30,0.3)', borderRadius: 12 } }, 'Sign in')
      )
    );
  }

  viewingBarEl() {
    const st = this.state;
    if (!st.configured) return this.h('div', { style: { height: 0 } });
    const btnStyle = { fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 13, fontWeight: 600, color: '#16361e', background: '#8ee05e', border: 'none', borderRadius: 999, padding: '7px 15px', cursor: 'pointer' };
    const name = st.me ? st.me.name : null;
    return this.h('div', { style: { maxWidth: 1120, margin: '0 auto', padding: '11px clamp(20px,4vw,40px)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 14, flexWrap: 'wrap' } },
      this.h('span', { style: { display: 'inline-flex', alignItems: 'center', gap: 9, fontSize: 14, color: '#cfe6d2' } },
        this.h('span', { style: { width: 8, height: 8, borderRadius: '50%', background: name ? '#8ee05e' : '#c9a24a', display: 'inline-block' } }),
        name ? ('Signed in as ' + name) : 'Browsing as a guest — sign in to comment'
      ),
      name
        ? this.h('button', { type: 'button', onClick: () => window.AK.signOut(), style: btnStyle }, 'Sign out')
        : this.h('a', { href: 'SignIn.dc.html', style: { ...btnStyle, textDecoration: 'none', display: 'inline-block' } }, 'Sign in')
    );
  }

  backLink(label) {
    return this.h('a', { href: 'Projects.dc.html', style: { display: 'inline-flex', alignItems: 'center', gap: 7, textDecoration: 'none', fontSize: 15, fontWeight: 600, color: '#16361e', marginBottom: 22 } },
      this.h('svg', { width: 16, height: 16, viewBox: '0 0 24 24', fill: 'none', stroke: '#16361e', strokeWidth: 1.9, strokeLinecap: 'round', strokeLinejoin: 'round', 'aria-hidden': true }, this.h('path', { d: 'M15 18l-6-6 6-6' })),
      label
    );
  }

  tagsEl(tags) {
    if (!tags || !tags.length) return null;
    const style = { fontSize: 13, color: '#16361e', background: '#ffffff', border: '1px solid rgba(22,54,30,0.16)', borderRadius: 999, padding: '5px 12px' };
    return this.h('div', { style: { display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 24 } }, ...tags.map((t) => this.h('span', { key: t, style }, t)));
  }

  detailRow(label, value, valueColor) {
    if (!value) return null;
    return this.h('div', { style: { display: 'flex', justifyContent: 'space-between', gap: 14, fontSize: 14 } },
      this.h('span', { style: { color: '#5a7060', flex: '0 0 auto' } }, label),
      this.h('span', { style: { color: valueColor || '#16361e', fontWeight: 600, textAlign: 'right' } }, value)
    );
  }

  factTile(label, value) {
    if (!value) return null;
    return this.h('div', { style: { background: '#f6fcf0', border: '1px solid rgba(22,54,30,0.10)', borderRadius: 12, padding: '12px 14px' } },
      this.h('div', { style: { fontSize: 12, fontWeight: 800, letterSpacing: 0.7, textTransform: 'uppercase', color: '#5a7060', marginBottom: 4 } }, label),
      this.h('div', { style: { fontSize: 15, lineHeight: 1.4, fontWeight: 600, color: '#16361e' } }, value)
    );
  }

  notFoundEl() {
    return this.h('div', null,
      this.backLink('All projects'),
      this.h('div', { style: { background: '#ffffff', border: '1px dashed rgba(22,54,30,0.22)', borderRadius: 18, padding: '52px 26px', textAlign: 'center' } },
        this.h('h1', { style: { fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 26, color: '#16361e', margin: '0 0 8px' } }, 'Project not found'),
        this.h('p', { style: { fontSize: 16, color: '#5a7060', margin: '0 0 22px' } }, 'This project may have been removed. Browse the current projects instead.'),
        this.h('a', { href: 'Projects.dc.html', style: { display: 'inline-flex', alignItems: 'center', justifyContent: 'center', minHeight: 48, padding: '0 24px', textDecoration: 'none', fontSize: 15, fontWeight: 700, color: '#eafbe1', background: '#16361e', borderRadius: 12 } }, 'View all projects')
      )
    );
  }

  sidebarEl(pr) {
    const st = this.state;
    const b = st.threadStats.boosts || [];
    const uid = st.me && st.me.uid;
    const interested = !!(uid && b.indexOf(uid) !== -1);
    const onInterested = this.guarded(() => window.AK.toggleThreadReaction(st.projectId, 'boosts').catch((e) => console.error(e)));

    const detailsCard = this.h('div', { style: { background: '#ffffff', border: '1px solid rgba(22,54,30,0.13)', borderRadius: 18, padding: 22 } },
      this.h('h3', { style: { fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 12, fontWeight: 700, letterSpacing: 1, textTransform: 'uppercase', color: '#5a7060', margin: '0 0 16px' } }, 'Project details'),
      this.h('div', { style: { display: 'flex', flexDirection: 'column', gap: 13 } },
        this.detailRow('Status', this.statusLabel(pr.status), pr.status === 'past' ? '#16361e' : '#fe4c24'),
        this.detailRow('Region', pr.region),
        this.detailRow('Timeline', pr.timeline),
        this.detailRow('Taking part', pr.participants)
      ),
      this.h('button', { type: 'button', onClick: onInterested, style: { display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, width: '100%', marginTop: 18, minHeight: 46, fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 14, fontWeight: 700, borderRadius: 11, cursor: 'pointer', transition: 'all .15s ease', background: interested ? '#fe4c24' : '#ffffff', color: interested ? '#ffffff' : '#16361e', border: '1.5px solid ' + (interested ? '#fe4c24' : 'rgba(22,54,30,0.22)') } },
        this.icon('boost', 16), interested ? 'Interested · ' + b.length : 'I am interested' + (b.length ? ' · ' + b.length : ''))
    );

    const managerCard = this.h('div', { style: { background: '#ffffff', border: '1px solid rgba(22,54,30,0.13)', borderRadius: 18, padding: 22 } },
      this.h('h3', { style: { fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 12, fontWeight: 700, letterSpacing: 1, textTransform: 'uppercase', color: '#5a7060', margin: '0 0 16px' } }, 'Project manager'),
      this.h('div', { style: { display: 'flex', alignItems: 'center', gap: 13 } },
        this.h('span', { style: { flex: '0 0 auto', width: 52, height: 52, borderRadius: '50%', background: '#16361e', color: '#bff0a6', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 20 } }, pr.managerInitials || ''),
        this.h('div', null,
          this.h('div', { style: { fontSize: 16, fontWeight: 600, color: '#16361e' } }, pr.manager || 'Member'),
          pr.managerRole ? this.h('div', { style: { fontSize: 14, color: '#5a7060' } }, pr.managerRole) : null
        )
      )
    );

    return this.h('aside', { className: 'ak-detail-side', style: { display: 'flex', flexDirection: 'column', gap: 18 } }, detailsCard, managerCard);
  }

  mainEl(pr) {
    const overviewParas = String(pr.overview || pr.summary || '').split(/\n\n+|\n/).filter(Boolean).map((p, i) => this.h('p', { key: i, style: { fontSize: 17, lineHeight: 1.7, color: '#26352c', margin: '0 0 18px' } }, p));
    const msItems = String(pr.milestones || '').split(/\n+/).map((s) => s.trim()).filter(Boolean);
    const milestones = msItems.length ? this.h(React.Fragment, null,
      this.h('h3', { style: { fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 21, color: '#16361e', margin: '28px 0 12px' } }, 'Progress & milestones'),
      this.h('ul', { style: { fontSize: 17, lineHeight: 1.7, color: '#26352c', margin: 0, paddingLeft: 22 } }, ...msItems.map((m, i) => this.h('li', { key: i, style: { marginBottom: i === msItems.length - 1 ? 0 : 8 } }, m)))
    ) : null;

    const isPast = pr.status === 'past';

    return this.h('div', null,
      this.h('div', { style: { display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', marginBottom: 14 } },
        this.h('span', { style: { display: 'inline-flex', alignItems: 'center', whiteSpace: 'nowrap', fontSize: 12, fontWeight: 700, letterSpacing: 0.3, padding: '5px 11px', borderRadius: 999, background: isPast ? '#16361e' : '#8ee05e', color: isPast ? '#bff0a6' : '#0f2a16' } }, this.statusLabel(pr.status)),
        pr.region ? this.h('span', { style: { fontSize: 13, fontWeight: 600, color: '#5a7060' } }, pr.region) : null,
        pr.timeline ? this.h(React.Fragment, null,
          this.h('span', { style: { width: 3, height: 3, borderRadius: '50%', background: '#b6cdac', display: 'inline-block' } }),
          this.h('span', { style: { fontSize: 13, color: '#5a7060' } }, pr.timeline)
        ) : null
      ),
      this.h('h1', { style: { fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 'clamp(30px,3.8vw,44px)', lineHeight: 1.12, color: '#16361e', margin: '0 0 18px', letterSpacing: '-0.4px' } }, pr.title || 'Untitled project'),
      this.tagsEl(pr.tags),
      this.h('div', { style: { background: '#ffffff', border: '1px solid rgba(22,54,30,0.13)', borderRadius: 20, padding: 'clamp(24px,3vw,36px)' } },
        this.h('h2', { style: { fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 21, color: '#16361e', margin: '0 0 14px' } }, 'Overview'),
        ...overviewParas,
        this.h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit,minmax(180px,1fr))', gap: 10, margin: '24px 0 6px' } },
          this.factTile('Project manager', pr.manager),
          this.factTile('Proposed by', pr.originator),
          this.factTile('Financed by', pr.funder),
          this.factTile('Region', pr.region)
        ),
        milestones
      ),
      pr.whatsappUrl ? this.h('div', { style: { background: '#16361e', borderRadius: 22, padding: 'clamp(24px,3vw,34px)', margin: '24px 0 0', color: '#dbeede' } },
        this.h('div', { style: { display: 'inline-flex', alignItems: 'center', gap: 9, padding: '6px 13px', borderRadius: 999, background: 'rgba(142,224,94,0.18)', marginBottom: 16 } },
          this.h('span', { style: { width: 8, height: 8, borderRadius: '50%', background: '#8ee05e', display: 'inline-block' } }),
          this.h('span', { style: { fontSize: 12, fontWeight: 700, letterSpacing: 0.8, textTransform: 'uppercase', color: '#bff0a6' } }, isPast ? 'Stay in touch' : 'Get involved')
        ),
        this.h('h3', { style: { fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 26, color: '#ffffff', margin: '0 0 10px', lineHeight: 1.2 } }, isPast ? 'Follow up on this project' : 'Join this project on WhatsApp'),
        this.h('p', { style: { fontSize: 16, lineHeight: 1.65, color: '#aecdb4', margin: '0 0 22px', maxWidth: 560 } }, isPast ? 'This project is complete, but the working group still answers questions and shares the results in its WhatsApp group.' : 'The project is coordinated in a dedicated WhatsApp group. Join to follow progress, share field data, and take part in the trial.'),
        this.h('a', { href: pr.whatsappUrl, target: '_blank', rel: 'noreferrer', className: 'ak-whatsapp', style: { display: 'inline-flex', alignItems: 'center', gap: 9, justifyContent: 'center', minHeight: 50, padding: '0 24px', textDecoration: 'none', fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 15, fontWeight: 700, color: '#0f2a16', background: '#8ee05e', borderRadius: 12, transition: 'background .15s ease' } },
          this.h('svg', { width: 18, height: 18, viewBox: '0 0 24 24', fill: 'currentColor', 'aria-hidden': true }, this.h('path', { d: 'M12.04 2c-5.46 0-9.9 4.43-9.9 9.9 0 1.74.46 3.45 1.33 4.95L2.05 22l5.3-1.38a9.9 9.9 0 0 0 4.69 1.19c5.46 0 9.9-4.43 9.9-9.9S17.5 2 12.04 2zm0 18.06c-1.5 0-2.97-.4-4.25-1.16l-.3-.18-3.15.82.84-3.07-.2-.32a8.16 8.16 0 0 1-1.25-4.35 8.23 8.23 0 1 1 8.26 8.24zm4.5-6.16c-.25-.13-1.47-.72-1.7-.8-.23-.09-.4-.13-.56.12-.16.25-.64.8-.79.97-.14.16-.29.18-.54.06-.25-.13-1.05-.39-2-1.23-.74-.66-1.24-1.47-1.38-1.72-.14-.25-.02-.39.11-.51.11-.11.25-.29.37-.43.12-.14.16-.25.25-.41.08-.16.04-.31-.02-.43-.06-.12-.56-1.35-.77-1.85-.2-.48-.4-.42-.56-.42l-.48-.01c-.16 0-.43.06-.66.31-.23.25-.86.85-.86 2.07 0 1.22.89 2.4 1.01 2.56.12.16 1.74 2.66 4.22 3.73.59.25 1.05.4 1.41.52.59.19 1.13.16 1.56.1.48-.07 1.47-.6 1.68-1.18.21-.58.21-1.07.14-1.18-.06-.1-.22-.16-.47-.28z' })),
          isPast ? "Open this project's WhatsApp group" : "Join this project's WhatsApp group"
        )
      ) : null,
      this.repliesSectionEl()
    );
  }

  bodyEl() {
    const st = this.state;
    if (st.prLoading) return this.h('div', null, this.backLink('All projects'), this.h('div', { style: { padding: '30px 0', fontSize: 16, color: '#5a7060' } }, 'Loading project…'));
    const pr = st.pr;
    if (!pr) return this.notFoundEl();
    return this.h('div', null,
      this.backLink('All projects'),
      this.h('div', { className: 'ak-detail-grid', style: { display: 'grid', gridTemplateColumns: '1fr 312px', gap: 32, alignItems: 'start' } },
        this.mainEl(pr),
        this.sidebarEl(pr)
      )
    );
  }

  renderVals() {
    return { viewingBarEl: this.viewingBarEl(), bodyEl: this.bodyEl() };
  }
}
</script>
</body>
<style>
header{transition:opacity .28s ease,transform .28s ease,box-shadow .28s ease!important;}
html.hdr-off header{opacity:0!important;transform:translateY(-100%)!important;pointer-events:none!important;}
@media (max-width:820px){.ak-detail-grid{grid-template-columns:1fr!important;}}
</style>
<script>
(function(){
  var root=document.documentElement,lastY=0,ticking=false;
  window.addEventListener('scroll',function(){
    if(ticking)return;ticking=true;
    requestAnimationFrame(function(){
      var y=Math.max(0,window.scrollY||0),d=y-lastY;
      if(y<24||d<0)root.classList.remove('hdr-off');
      else if(y>96&&d>0)root.classList.add('hdr-off');
      lastY=y;ticking=false;
    });
  },{passive:true});
})();
</script>
</html>
