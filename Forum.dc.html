<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mozilla+Text:wght@200..700&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,400;1,700&family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="assets/Favicon/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="assets/Favicon/favicon.svg" />
<link rel="shortcut icon" href="assets/Favicon/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="assets/Favicon/apple-touch-icon.png" />
<link rel="manifest" href="assets/Favicon/site.webmanifest" />
<script src="./gate.js"></script>
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  ::selection{background:#8ee05e;color:#08100d;}
  .ak-board{color:#2f5a3a;text-decoration:none;transition:color .12s ease;}
  .ak-board:hover{color:#fe4c24;text-decoration:underline;}
  .ak-link{color:#16361e;}
  .ak-link:hover{color:#fe4c24;}
  .ak-x:hover{color:#ffffff;}
  .ak-filter-toggle:hover{color:#ffffff;}
</style>
</helmet>

<div style="background:#e3fbd8;min-height:100vh;font-family:'Ubuntu',Arial,sans-serif;color:#08100d;">
  <dc-import name="Header" active="forum" hint-size="100%,72px"></dc-import>

  <section style="max-width:1080px;margin:0 auto;padding:clamp(22px,3vw,40px) clamp(20px,4vw,40px) clamp(48px,5vw,80px);">
    {{ heroEl }}
    {{ introEl }}
    {{ boardsEl }}
  </section>

  <dc-import name="Footer" hint-size="100%,320px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{}">
class Component extends DCLogic {
  state = { introOpen: true, filterOpen: false, filter: '' };

  h(type, props, ...children) {
    return React.createElement(type, props, ...children);
  }

  COLUMNS = [
    [
      { title: 'Crops', boards: ['Cereals & Wheat', 'Potatoes', 'Sugar Beet', 'Onions & Alliums', 'Maize & Forage', 'Field Vegetables', 'Seed & Varieties', 'Grassland & Fodder'] },
      { title: 'Regions', boards: ['Groningen', 'Friesland', 'Drenthe', 'Flevoland', 'Overijssel', 'Gelderland', 'Zeeland', 'Noord-Brabant'] },
    ],
    [
      { title: 'Soil & Nutrition', boards: ['Soil Health', 'Fertilisation', 'Organic Matter', 'Liming & pH', 'Cover Crops', 'Drainage & Structure', 'Soil Sampling'] },
      { title: 'Water & Weather', boards: ['Irrigation', 'Drought Strategy', 'Weather & Models', 'Water Quality', 'Flooding & Salinity'] },
    ],
    [
      { title: 'Crop Protection', boards: ['Pests & Insects', 'Diseases & Fungi', 'Weeds & Herbicides', 'Integrated Pest Mgmt', 'Biological Control', 'Spray Technique', 'Resistance Management'] },
    ],
    [
      { title: 'Technology', boards: ['Precision Agriculture', 'GPS & Auto-steer', 'Drones & Sensors', 'Autonomous Robots', 'Machinery & Repair', 'Farm Data & Software'] },
      { title: 'Business & Policy', boards: ['Markets & Prices', 'Subsidies & GLB', 'Regulations & Permits', 'Cooperatives', 'Sustainability', 'Succession & Land'] },
    ],
    [
      { title: 'Community', boards: ['Introductions', 'The Field - Random', 'Cafe / Off-topic', 'Meetups & Events', 'Marketplace', 'Site Feedback'] },
    ],
  ];

  heroEl() {
    return this.h('div', { style: { textAlign: 'center', margin: '2px 0 24px' } },
      this.h('img', { src: 'assets/logo.png', alt: '', width: 46, height: 46, style: { width: 46, height: 46, borderRadius: '50%', display: 'inline-block', marginBottom: 10 } }),
      this.h('h1', { style: { fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 'clamp(26px,3.4vw,36px)', color: '#16361e', margin: '0 0 6px', letterSpacing: '-0.4px' } }, 'Community Boards'),
      this.h('p', { style: { fontSize: 15, color: '#5a7060', margin: 0 } }, 'Pick a board and jump into the discussion.')
    );
  }

  box(title, control, body) {
    return this.h('div', { style: { border: '1px solid rgba(22,54,30,0.18)', borderRadius: 12, overflow: 'hidden', background: '#ffffff', marginBottom: 20 } },
      this.h('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12, background: '#16361e', color: '#eafbe1', padding: '10px 16px' } },
        this.h('span', { style: { fontSize: 15, fontWeight: 700, letterSpacing: 0.3 } }, title),
        control
      ),
      body
    );
  }

  introEl(st) {
    if (!st.introOpen) return null;
    const xBtn = this.h('button', {
      type: 'button', className: 'ak-x', 'aria-label': 'Dismiss', onClick: () => this.setState({ introOpen: false }),
      style: { display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: 26, height: 26, color: '#bcd9c0', background: 'transparent', border: 'none', cursor: 'pointer', padding: 0, fontSize: 20, lineHeight: 1 },
    }, 'x');
    const body = this.h('div', { style: { padding: '18px 20px', fontSize: 15, lineHeight: 1.7, color: '#2c3f33' } },
      this.h('p', { style: { margin: '0 0 12px' } }, 'AkkerKennis is a knowledge board for arable farmers in the Netherlands. Pick a board below and jump into practical, field-tested discussion, everything from soil and crop protection to machinery, water, and markets. No hidden advertising, just real experience from the field.'),
      this.h('p', { style: { margin: 0 } }, 'New here? Read the ',
        this.h('a', { href: 'About.dc.html', className: 'ak-link', style: { color: '#16361e', fontWeight: 600 } }, 'community guidelines'),
        ' before posting, or visit the ',
        this.h('a', { href: 'Contact.dc.html', className: 'ak-link', style: { color: '#16361e', fontWeight: 600 } }, 'help & FAQ'),
        ' to learn how it works.')
    );
    return this.box('What is AkkerKennis?', xBtn, body);
  }

  filteredColumns(filter) {
    const f = filter.trim().toLowerCase();
    return this.COLUMNS
      .map((col) => col
        .map((g) => ({ title: g.title, boards: f ? g.boards.filter((b) => b.toLowerCase().includes(f)) : g.boards }))
        .filter((g) => g.boards.length))
      .filter((col) => col.length);
  }

  boardsEl(st) {
    const toggle = this.h('button', {
      type: 'button', className: 'ak-filter-toggle', onClick: () => this.setState((s) => ({ filterOpen: !s.filterOpen })),
      style: { fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 13, fontWeight: 600, color: '#bcd9c0', background: 'transparent', border: 'none', cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: 6 },
    }, 'filter', this.h('span', { style: { fontSize: 10 } }, st.filterOpen ? '^' : 'v'));

    const cols = this.filteredColumns(st.filter);

    const grid = this.h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit,minmax(168px,1fr))', gap: '22px 26px' } },
      ...cols.map((col, ci) => this.h('div', { key: ci, style: { display: 'flex', flexDirection: 'column', gap: 18 } },
        ...col.map((g, gi) => this.h('div', { key: gi },
          this.h('div', { style: { fontSize: 14, fontWeight: 700, color: '#16361e', textDecoration: 'underline', marginBottom: 7 } }, g.title),
          this.h('div', { style: { display: 'flex', flexDirection: 'column', gap: 3 } },
            ...g.boards.map((b) => this.h('a', { key: b, href: 'Thread.dc.html', className: 'ak-board', style: { fontSize: 13.5, lineHeight: 1.5, color: '#2f5a3a', textDecoration: 'none' } }, b))
          )
        ))
      ))
    );

    const empty = this.h('div', { style: { padding: '6px 2px 2px', fontSize: 14, color: '#5a7060' } }, 'No boards match "' + st.filter + '".');

    const filterRow = st.filterOpen ? this.h('div', { style: { marginBottom: 16 } },
      this.h('input', {
        type: 'text', value: st.filter, autoFocus: true, placeholder: 'Filter boards...',
        onInput: (e) => this.setState({ filter: e.target.value }),
        style: { width: '100%', maxWidth: 320, fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 14, color: '#16361e', background: '#f6fcf0', border: '1px solid rgba(22,54,30,0.18)', borderRadius: 10, padding: '9px 12px' },
      })
    ) : null;

    const body = this.h('div', { style: { padding: '18px 20px 22px' } },
      filterRow,
      cols.length ? grid : empty
    );

    return this.box('Boards', toggle, body);
  }

  renderVals() {
    const st = this.state;
    return {
      heroEl: this.heroEl(),
      introEl: this.introEl(st),
      boardsEl: this.boardsEl(st),
    };
  }
}
</script>
</body>
<style>
header{transition:opacity .28s ease,transform .28s ease,box-shadow .28s ease!important;}
html.hdr-off header{opacity:0!important;transform:translateY(-100%)!important;pointer-events:none!important;}
</style>
<script>
(function(){
  var root=document.documentElement,lastY=0,ticking=false;
  window.addEventListener('scroll',function(){
    if(ticking)return;ticking=true;
    requestAnimationFrame(function(){
      var y=Math.max(0,window.scrollY||0),d=y-lastY;
      if(y<24||d<0)root.classList.remove('hdr-off');
      else if(y>96&&d>0)root.classList.add('hdr-off');
      lastY=y;ticking=false;
    });
  },{passive:true});
})();
</script>
</html>
