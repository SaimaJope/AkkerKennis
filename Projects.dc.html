<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mozilla+Text:wght@200..700&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,400;1,700&family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="assets/Favicon/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="assets/Favicon/favicon.svg" />
<link rel="shortcut icon" href="assets/Favicon/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="assets/Favicon/apple-touch-icon.png" />
<link rel="manifest" href="assets/Favicon/site.webmanifest" />
<script src="./gate.js"></script>
<script src="./theme.js"></script>
<script src="./firebase.js"></script>
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  ::selection{background:#8ee05e;color:#08100d;}
  select{appearance:none;-webkit-appearance:none;}
  .ak-project-card:hover{transform:translateY(-2px);border-color:rgba(22,54,30,0.28);}
  .ak-project-card:hover .ak-project-open{gap:9px;}
  .ak-new-project:hover{background:#0f2716;}
</style>
</helmet>

<div style="background:#e3fbd8;min-height:100vh;font-family:'Ubuntu',Arial,sans-serif;color:#08100d;">
  <dc-import name="Header" active="projects" hint-size="100%,72px"></dc-import>

  <section style="max-width:1200px;margin:0 auto;padding:clamp(32px,4vw,56px) clamp(20px,4vw,40px) clamp(48px,5vw,80px);">
    <div style="margin-bottom:32px;max-width:700px;">
      <h1 style="font-family:'Ubuntu',Arial,sans-serif;font-size:clamp(34px,4.4vw,52px);color:#16361e;margin:0 0 10px;letter-spacing:-0.4px;">Projects</h1>
      <p style="font-size:18px;line-height:1.6;color:#33473b;margin:0;">Member-led pilots and collaborative trials that turn useful topics into practical field work. Open a project to see who runs it, who funds it, join the discussion, and take part.</p>
    </div>

    <div class="ak-projects-grid" style="display:grid;grid-template-columns:268px 1fr;gap:28px;align-items:start;">
      <!-- SIDEBAR -->
      <aside style="display:flex;flex-direction:column;gap:20px;">
        <a href="CreateProject.dc.html" class="ak-new-project" style="display:flex;align-items:center;justify-content:center;gap:9px;min-height:52px;text-decoration:none;font-size:16px;font-weight:600;color:#eafbe1;background:#16361e;border-radius:14px;transition:background .18s ease;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#eafbe1" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"></path></svg>
          New project
        </a>

        <div style="background:#ffffff;border:1px solid rgba(22,54,30,0.13);border-radius:18px;padding:20px;">
          <h3 style="font-family:'Ubuntu',Arial,sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#5a7060;margin:0 0 14px;">Status</h3>
          <div style="display:flex;flex-direction:column;gap:4px;">
            <sc-for list="{{ statusList }}" as="s" hint-placeholder-count="3">
              <button type="button" onClick="{{ s.onClick }}" style="{{ s.style }}">
                <span>{{ s.name }}</span>
                <span style="{{ s.countStyle }}">{{ s.count }}</span>
              </button>
            </sc-for>
          </div>
        </div>

        <div style="background:#ffffff;border:1px solid rgba(22,54,30,0.13);border-radius:18px;padding:20px;">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;">
            <h3 style="font-family:'Ubuntu',Arial,sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#5a7060;margin:0;">Region</h3>
            <div style="display:inline-flex;align-items:center;gap:3px;background:#e3fbd8;border:1px solid rgba(22,54,30,0.15);border-radius:999px;padding:3px;">
              <button type="button" onClick="{{ showMapRegion }}" style="{{ mapToggleStyle }}">Map</button>
              <button type="button" onClick="{{ showTextRegion }}" style="{{ textToggleStyle }}">Text</button>
            </div>
          </div>

          <sc-if value="{{ regionMapVisible }}" hint-placeholder-val="{{ true }}">
            <div style="display:flex;justify-content:center;margin:2px 0 12px;">
              <dc-import name="NLMap" selected="{{ mapSelected }}" interactive="true" showCaption="false" onSelect="{{ onMapRegion }}" hint-size="228px,260px"></dc-import>
            </div>
            <div style="display:flex;flex-direction:column;gap:8px;">
              <div style="font-size:13px;line-height:1.4;color:#5a7060;">{{ regionHint }}</div>
              <button type="button" onClick="{{ clearRegion }}" style="{{ allRegionsStyle }}">{{ allRegionsLabel }}</button>
            </div>
          </sc-if>

          <sc-if value="{{ regionTextVisible }}" hint-placeholder-val="{{ false }}">
            <div style="position:relative;">
              <select value="{{ region }}" onChange="{{ onRegion }}" style="width:100%;font-family:'Ubuntu',Arial,sans-serif;font-size:15px;color:#16361e;background:#e3fbd8;border:1px solid rgba(22,54,30,0.18);border-radius:12px;padding:13px 38px 13px 14px;cursor:pointer;">
                <sc-for list="{{ regionOpts }}" as="r" hint-placeholder-count="6">
                  <option value="{{ r.id }}">{{ r.name }}</option>
                </sc-for>
              </select>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#16361e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);pointer-events:none;"><path d="M6 9l6 6 6-6"></path></svg>
            </div>
          </sc-if>
        </div>
      </aside>

      <!-- MAIN -->
      <div>
        <div style="position:relative;margin-bottom:22px;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#5a7060" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="position:absolute;left:18px;top:50%;transform:translateY(-50%);"><circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4.3-4.3"></path></svg>
          <input type="text" value="{{ query }}" onInput="{{ onQuery }}" placeholder="Search projects, managers, funders..." style="width:100%;font-family:'Ubuntu',Arial,sans-serif;font-size:16px;color:#08100d;background:#ffffff;border:1px solid rgba(22,54,30,0.16);border-radius:14px;padding:16px 18px 16px 50px;" />
        </div>

        {{ bodyEl }}
      </div>
    </div>
  </section>

  <dc-import name="Footer" hint-size="100%,320px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{}">
class Component extends DCLogic {
  state = { region: 'all', regionMode: 'map', status: 'all', query: '', remoteProjects: null, projectsError: '', configured: false };

  h(type, props, ...children) {
    return React.createElement(type, props, ...children);
  }

  componentDidMount() {
    const configured = !!(window.AK && window.AK.isConfigured && window.AK.isConfigured());
    this.setState({ configured });
    if (configured) {
      this._unsub = window.AK.watchProjects((rows, err) => {
        if (err) this.setState({ projectsError: err });
        else this.setState({ remoteProjects: rows || [], projectsError: '' });
      });
    } else {
      this.setState({ remoteProjects: [] });
    }
  }

  componentWillUnmount() {
    if (this._unsub) this._unsub();
  }

  REGIONS = [
    { id: 'all', name: 'All regions' },
    { id: 'groningen', name: 'Groningen' }, { id: 'friesland', name: 'Friesland' }, { id: 'drenthe', name: 'Drenthe' },
    { id: 'noordholland', name: 'Noord-Holland' }, { id: 'flevoland', name: 'Flevoland' }, { id: 'overijssel', name: 'Overijssel' },
    { id: 'utrecht', name: 'Utrecht' }, { id: 'gelderland', name: 'Gelderland' }, { id: 'zuidholland', name: 'Zuid-Holland' },
    { id: 'zeeland', name: 'Zeeland' }, { id: 'noordbrabant', name: 'Noord-Brabant' }, { id: 'limburg', name: 'Limburg' },
  ];

  regionName(id) {
    const found = this.REGIONS.find((r) => r.id === id);
    return found ? found.name : 'All regions';
  }

  projects() {
    return this.state.remoteProjects || [];
  }

  filtered() {
    const st = this.state;
    const q = st.query.trim().toLowerCase();
    return this.projects().filter((p) => {
      if (st.region !== 'all' && p.regionId !== st.region) return false;
      if (q) {
        const hay = [(p.title || ''), (p.summary || ''), (p.manager || ''), (p.funder || ''), (p.region || '')].join(' ').toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  }

  projectCard(project) {
    const isPast = project.status === 'past';
    return this.h('a', { key: project.id, href: 'Project.dc.html?id=' + encodeURIComponent(project.id), className: 'ak-project-card', style: { textDecoration: 'none', color: 'inherit', background: '#ffffff', border: '1px solid rgba(22,54,30,0.13)', borderRadius: 20, padding: 24, display: 'flex', flexDirection: 'column', minHeight: 250, transition: 'transform .16s ease,border-color .16s ease' } },
      this.h('div', { style: { display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', marginBottom: 12 } },
        this.h('span', { style: { display: 'inline-flex', alignItems: 'center', whiteSpace: 'nowrap', fontSize: 12, fontWeight: 800, letterSpacing: 0.5, textTransform: 'uppercase', padding: '5px 11px', borderRadius: 999, background: isPast ? '#16361e' : '#8ee05e', color: isPast ? '#bff0a6' : '#0f2a16' } }, isPast ? 'Past' : 'Ongoing'),
        project.region ? this.h('span', { style: { fontSize: 13, fontWeight: 700, color: '#fe4c24', textTransform: 'uppercase', letterSpacing: 0.4 } }, project.region) : null
      ),
      this.h('h3', { style: { fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 23, lineHeight: 1.22, color: '#16361e', margin: '0 0 10px' } }, project.title),
      this.h('p', { style: { fontSize: 15, lineHeight: 1.6, color: '#33473b', margin: '0 0 16px' } }, project.summary),
      this.h('div', { style: { display: 'flex', flexDirection: 'column', gap: 6, marginTop: 'auto', marginBottom: 16, fontSize: 14, color: '#5a7060' } },
        project.manager ? this.h('span', null, this.h('strong', { style: { color: '#16361e' } }, 'Manager: '), project.manager) : null,
        project.funder ? this.h('span', null, this.h('strong', { style: { color: '#16361e' } }, 'Funded by: '), project.funder) : null
      ),
      this.h('span', { className: 'ak-project-open', style: { display: 'inline-flex', alignItems: 'center', gap: 7, fontSize: 15, fontWeight: 700, color: '#16361e', transition: 'gap .15s ease' } },
        'View project details',
        this.h('svg', { width: 16, height: 16, viewBox: '0 0 24 24', fill: 'none', stroke: '#16361e', strokeWidth: 1.9, strokeLinecap: 'round', strokeLinejoin: 'round', 'aria-hidden': true }, this.h('path', { d: 'M9 18l6-6-6-6' }))
      )
    );
  }

  sectionEl(title, projects, emptyText) {
    return this.h('section', { key: title, style: { marginBottom: 36 } },
      this.h('div', { style: { display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', gap: 16, flexWrap: 'wrap', marginBottom: 16 } },
        this.h('h2', { style: { fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 'clamp(24px,3vw,32px)', color: '#16361e', margin: 0 } }, title),
        this.h('span', { style: { fontSize: 14, fontWeight: 700, color: '#5a7060' } }, projects.length + (projects.length === 1 ? ' project' : ' projects'))
      ),
      projects.length
        ? this.h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(330px,1fr))', gap: 18 } }, ...projects.map((project) => this.projectCard(project)))
        : this.h('div', { style: { background: '#ffffff', border: '1px dashed rgba(22,54,30,0.22)', borderRadius: 18, padding: '40px 26px', textAlign: 'center', fontSize: 15, color: '#5a7060' } }, emptyText)
    );
  }

  firstRunEmptyEl() {
    return this.h('div', { style: { background: '#ffffff', border: '1px dashed rgba(22,54,30,0.22)', borderRadius: 18, padding: '52px 26px', textAlign: 'center' } },
      this.h('h3', { style: { fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 22, color: '#16361e', margin: '0 0 8px' } }, 'No projects yet'),
      this.h('p', { style: { fontSize: 15, color: '#5a7060', margin: '0 0 22px' } }, 'Turn a promising topic into practical field work — start the first member-led project.'),
      this.h('a', { href: 'CreateProject.dc.html', style: { display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8, minHeight: 50, padding: '0 24px', textDecoration: 'none', fontSize: 15, fontWeight: 700, color: '#eafbe1', background: '#16361e', borderRadius: 12 } },
        this.h('svg', { width: 17, height: 17, viewBox: '0 0 24 24', fill: 'none', stroke: '#eafbe1', strokeWidth: 1.9, strokeLinecap: 'round', strokeLinejoin: 'round' }, this.h('path', { d: 'M12 5v14M5 12h14' })),
        'Start the first project')
    );
  }

  errorEl(msg) {
    return this.h('div', { style: { background: '#fde9e3', border: '1px solid rgba(254,76,36,0.28)', borderRadius: 18, padding: '24px 26px' } },
      this.h('h3', { style: { fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 20, color: '#c43a18', margin: '0 0 6px' } }, 'Projects can’t load from the database'),
      this.h('p', { style: { fontSize: 15, lineHeight: 1.55, color: '#8a3b22', margin: '0 0 8px' } }, 'Create the Firestore database and publish the security rules (see SETUP_FIREBASE.md). Once published, projects appear here instantly.'),
      this.h('div', { style: { fontSize: 13, fontFamily: 'Ubuntu Mono, monospace', color: '#8a3b22', opacity: 0.8 } }, 'Details: ' + msg)
    );
  }

  bodyEl() {
    const st = this.state;
    if (st.configured && st.projectsError) return this.errorEl(st.projectsError);
    if (st.remoteProjects === null) return this.h('div', { style: { padding: '40px 4px', fontSize: 16, color: '#5a7060' } }, 'Loading projects…');
    if (this.projects().length === 0) return this.firstRunEmptyEl();

    const list = this.filtered();
    const ongoing = list.filter((p) => p.status !== 'past');
    const past = list.filter((p) => p.status === 'past');

    const sections = [];
    if (st.status === 'all' || st.status === 'ongoing') sections.push(this.sectionEl('Ongoing projects', ongoing, 'No ongoing projects match your filters.'));
    if (st.status === 'all' || st.status === 'past') sections.push(this.sectionEl('Past projects', past, 'No past projects match your filters.'));
    return this.h(React.Fragment, null, ...sections);
  }

  renderVals() {
    const st = this.state;
    const all = this.projects();
    const regionSelected = st.region !== 'all';
    const selectedRegionName = this.regionName(st.region);

    const counts = { all: all.length, ongoing: all.filter((p) => p.status !== 'past').length, past: all.filter((p) => p.status === 'past').length };
    const chipBase = 'display:flex;align-items:center;justify-content:space-between;width:100%;text-align:left;font-family:\'Ubuntu\',Arial,sans-serif;font-size:15px;border:none;border-radius:11px;padding:11px 13px;cursor:pointer;transition:background .15s ease;';
    const mkStatus = (id, name, count) => {
      const active = st.status === id;
      return {
        name, count,
        style: chipBase + (active ? 'background:#16361e;color:#eafbe1;font-weight:600;' : 'background:transparent;color:#16361e;font-weight:500;'),
        countStyle: 'font-size:13px;' + (active ? 'color:#9fd587;' : 'color:#8aa090;'),
        onClick: () => this.setState({ status: id }),
      };
    };
    const statusList = [mkStatus('all', 'All projects', counts.all), mkStatus('ongoing', 'Ongoing', counts.ongoing), mkStatus('past', 'Past', counts.past)];

    const mapMode = st.regionMode === 'map';
    const modeBase = "font-family:'Ubuntu',Arial,sans-serif;font-size:12px;font-weight:700;border:none;border-radius:999px;padding:6px 10px;cursor:pointer;line-height:1;";

    return {
      bodyEl: this.bodyEl(),
      statusList,
      regionOpts: this.REGIONS,
      region: st.region,
      mapSelected: st.region,
      query: st.query,
      regionMapVisible: mapMode,
      regionTextVisible: !mapMode,
      mapToggleStyle: modeBase + (mapMode ? 'background:#16361e;color:#eafbe1;' : 'background:transparent;color:#16361e;'),
      textToggleStyle: modeBase + (!mapMode ? 'background:#16361e;color:#eafbe1;' : 'background:transparent;color:#16361e;'),
      regionHint: regionSelected ? 'Showing projects in ' + selectedRegionName + '.' : 'Tap a province to filter projects.',
      allRegionsLabel: regionSelected ? 'Clear region: ' + selectedRegionName : 'All regions',
      allRegionsStyle: "width:100%;font-family:'Ubuntu',Arial,sans-serif;font-size:14px;font-weight:600;color:#16361e;background:" + (regionSelected ? '#ffffff' : '#e3fbd8') + ";border:1px solid rgba(22,54,30,0.18);border-radius:12px;padding:11px 13px;cursor:pointer;text-align:center;",
      showMapRegion: () => this.setState({ regionMode: 'map' }),
      showTextRegion: () => this.setState({ regionMode: 'text' }),
      onMapRegion: (id) => this.setState({ region: id }),
      clearRegion: () => this.setState({ region: 'all' }),
      onRegion: (e) => this.setState({ region: e.target.value }),
      onQuery: (e) => this.setState({ query: e.target.value }),
    };
  }
}
</script>
</body>
<style>
header{transition:opacity .28s ease,transform .28s ease,box-shadow .28s ease!important;}
html.hdr-off header{opacity:0!important;transform:translateY(-100%)!important;pointer-events:none!important;}
@media (max-width:820px){.ak-projects-grid{grid-template-columns:1fr!important;}}
</style>
<script>
(function(){
  var root=document.documentElement,lastY=0,ticking=false;
  window.addEventListener('scroll',function(){
    if(ticking)return;ticking=true;
    requestAnimationFrame(function(){
      var y=Math.max(0,window.scrollY||0),d=y-lastY;
      if(y<24||d<0)root.classList.remove('hdr-off');
      else if(y>96&&d>0)root.classList.add('hdr-off');
      lastY=y;ticking=false;
    });
  },{passive:true});
})();
</script>
</html>
