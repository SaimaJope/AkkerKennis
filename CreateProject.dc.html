<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mozilla+Text:wght@200..700&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,400;1,700&family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="assets/Favicon/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="assets/Favicon/favicon.svg" />
<link rel="shortcut icon" href="assets/Favicon/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="assets/Favicon/apple-touch-icon.png" />
<link rel="manifest" href="assets/Favicon/site.webmanifest" />
<script src="./gate.js"></script>
<script src="./theme.js"></script>
<script src="./firebase.js"></script>
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  ::selection{background:#8ee05e;color:#08100d;}
  select{appearance:none;-webkit-appearance:none;}
  textarea,input{font-family:'Ubuntu',Arial,sans-serif;}
</style>
</helmet>

<div style="background:#e3fbd8;min-height:100vh;font-family:'Ubuntu',Arial,sans-serif;color:#08100d;">
  <dc-import name="Header" active="projects" hint-size="100%,72px"></dc-import>

  <section style="max-width:760px;margin:0 auto;padding:clamp(28px,3vw,44px) clamp(20px,4vw,40px) clamp(48px,5vw,80px);">
    <a href="Projects.dc.html" style="display:inline-flex;align-items:center;gap:7px;text-decoration:none;font-size:15px;font-weight:600;color:#16361e;margin-bottom:20px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#16361e" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"></path></svg>
      Topics
    </a>

    <h1 style="font-family:'Ubuntu',Arial,sans-serif;font-size:clamp(30px,3.8vw,44px);color:#16361e;margin:0 0 8px;letter-spacing:-0.4px;">Start a topic</h1>
    <p style="font-size:17px;color:#33473b;margin:0 0 30px;max-width:560px;">Member-led pilots and collaborative trials. Explain what the topic tests, who runs and funds it, and how other farmers can take part.</p>

    <sc-if value="{{ adminBlocked }}" hint-placeholder-val="{{ false }}">
      {{ adminNoticeEl }}
    </sc-if>

    <sc-if value="{{ canCreate }}" hint-placeholder-val="{{ true }}">

    <!-- STATUS -->
    <div style="margin-bottom:24px;">
      <span style="display:block;font-size:14px;font-weight:600;color:#16361e;margin-bottom:10px;">Status</span>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;">
        <sc-for list="{{ statuses }}" as="s" hint-placeholder-count="2">
          <button type="button" onClick="{{ s.onClick }}" style="{{ s.style }}">
            <span style="{{ s.iconWrap }}">{{ s.iconEl }}</span>
            {{ s.name }}
          </button>
        </sc-for>
      </div>
    </div>

    <div style="background:#ffffff;border:1px solid rgba(22,54,30,0.13);border-radius:20px;padding:clamp(22px,3vw,32px);display:flex;flex-direction:column;gap:22px;">
      <label style="display:block;">
        <span style="display:block;font-size:14px;font-weight:600;color:#16361e;margin-bottom:7px;">Topic title</span>
        <input type="text" value="{{ title }}" onInput="{{ onTitle }}" placeholder="e.g. Variable Rate Onion Seeding Trial" style="width:100%;font-size:16px;color:#08100d;background:#f6fcf0;border:1px solid rgba(22,54,30,0.18);border-radius:12px;padding:14px 16px;" />
      </label>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <label style="display:block;">
          <span style="display:block;font-size:14px;font-weight:600;color:#16361e;margin-bottom:7px;">Topic manager</span>
          <input type="text" value="{{ manager }}" onInput="{{ onManager }}" placeholder="Who runs it" style="width:100%;font-size:15px;color:#08100d;background:#f6fcf0;border:1px solid rgba(22,54,30,0.18);border-radius:12px;padding:14px 16px;" />
        </label>
        <label style="display:block;">
          <span style="display:block;font-size:14px;font-weight:600;color:#16361e;margin-bottom:7px;">Manager role <span style="color:#8aa090;font-weight:500;">(optional)</span></span>
          <input type="text" value="{{ managerRole }}" onInput="{{ onManagerRole }}" placeholder="e.g. Precision agronomist · Flevoland" style="width:100%;font-size:15px;color:#08100d;background:#f6fcf0;border:1px solid rgba(22,54,30,0.18);border-radius:12px;padding:14px 16px;" />
        </label>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <label style="display:block;">
          <span style="display:block;font-size:14px;font-weight:600;color:#16361e;margin-bottom:7px;">Proposed by <span style="color:#8aa090;font-weight:500;">(optional)</span></span>
          <input type="text" value="{{ originator }}" onInput="{{ onOriginator }}" placeholder="Who proposed it" style="width:100%;font-size:15px;color:#08100d;background:#f6fcf0;border:1px solid rgba(22,54,30,0.18);border-radius:12px;padding:14px 16px;" />
        </label>
        <label style="display:block;">
          <span style="display:block;font-size:14px;font-weight:600;color:#16361e;margin-bottom:7px;">Financed by <span style="color:#8aa090;font-weight:500;">(optional)</span></span>
          <input type="text" value="{{ funder }}" onInput="{{ onFunder }}" placeholder="Who funds it" style="width:100%;font-size:15px;color:#08100d;background:#f6fcf0;border:1px solid rgba(22,54,30,0.18);border-radius:12px;padding:14px 16px;" />
        </label>
      </div>

      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;">
        <label style="display:block;">
          <span style="display:block;font-size:14px;font-weight:600;color:#16361e;margin-bottom:7px;">Region</span>
          <div style="position:relative;">
            <select value="{{ region }}" onChange="{{ onRegion }}" style="width:100%;font-size:15px;color:#16361e;background:#f6fcf0;border:1px solid rgba(22,54,30,0.18);border-radius:12px;padding:14px 32px 14px 14px;cursor:pointer;">
              <option>Groningen</option><option>Friesland</option><option>Drenthe</option><option>Noord-Holland</option><option>Flevoland</option><option>Overijssel</option><option>Utrecht</option><option>Gelderland</option><option>Zuid-Holland</option><option>Zeeland</option><option>Noord-Brabant</option><option>Limburg</option>
            </select>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#16361e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);pointer-events:none;"><path d="M6 9l6 6 6-6"></path></svg>
          </div>
        </label>
        <label style="display:block;">
          <span style="display:block;font-size:14px;font-weight:600;color:#16361e;margin-bottom:7px;">Timeline <span style="color:#8aa090;font-weight:500;">(optional)</span></span>
          <input type="text" value="{{ timeline }}" onInput="{{ onTimeline }}" placeholder="e.g. 2026 season" style="width:100%;font-size:15px;color:#08100d;background:#f6fcf0;border:1px solid rgba(22,54,30,0.18);border-radius:12px;padding:14px 16px;" />
        </label>
        <label style="display:block;">
          <span style="display:block;font-size:14px;font-weight:600;color:#16361e;margin-bottom:7px;">Taking part <span style="color:#8aa090;font-weight:500;">(optional)</span></span>
          <input type="text" value="{{ participants }}" onInput="{{ onParticipants }}" placeholder="e.g. 5 farms" style="width:100%;font-size:15px;color:#08100d;background:#f6fcf0;border:1px solid rgba(22,54,30,0.18);border-radius:12px;padding:14px 16px;" />
        </label>
      </div>

      <label style="display:block;">
        <span style="display:block;font-size:14px;font-weight:600;color:#16361e;margin-bottom:7px;">Short summary</span>
        <textarea rows="2" value="{{ summary }}" onInput="{{ onSummary }}" placeholder="One or two sentences shown on the topic card." style="width:100%;font-size:16px;line-height:1.6;color:#08100d;background:#f6fcf0;border:1px solid rgba(22,54,30,0.18);border-radius:12px;padding:14px 16px;resize:vertical;"></textarea>
      </label>

      <label style="display:block;">
        <span style="display:block;font-size:14px;font-weight:600;color:#16361e;margin-bottom:7px;">Overview</span>
        <textarea rows="5" value="{{ overview }}" onInput="{{ onOverview }}" placeholder="Describe the project in full: what it tests, how it works across the farms, and what a useful result looks like. Leave a blank line between paragraphs." style="width:100%;font-size:16px;line-height:1.6;color:#08100d;background:#f6fcf0;border:1px solid rgba(22,54,30,0.18);border-radius:12px;padding:14px 16px;resize:vertical;"></textarea>
      </label>

      <label style="display:block;">
        <span style="display:block;font-size:14px;font-weight:600;color:#16361e;margin-bottom:7px;">Progress &amp; milestones <span style="color:#8aa090;font-weight:500;">(optional — one item per line)</span></span>
        <textarea rows="4" value="{{ milestones }}" onInput="{{ onMilestones }}" placeholder="Prescription maps built — done&#10;Split-field drilling — done&#10;Mid-season counts — in progress" style="width:100%;font-size:16px;line-height:1.6;color:#08100d;background:#f6fcf0;border:1px solid rgba(22,54,30,0.18);border-radius:12px;padding:14px 16px;resize:vertical;"></textarea>
      </label>

      <label style="display:block;">
        <span style="display:block;font-size:14px;font-weight:600;color:#16361e;margin-bottom:7px;">WhatsApp group link <span style="color:#8aa090;font-weight:500;">(optional)</span></span>
        <input type="text" value="{{ whatsappUrl }}" onInput="{{ onWhatsapp }}" placeholder="https://chat.whatsapp.com/..." style="width:100%;font-size:15px;color:#08100d;background:#f6fcf0;border:1px solid rgba(22,54,30,0.18);border-radius:12px;padding:14px 16px;" />
        <span style="display:block;font-size:13px;color:#8aa090;margin-top:6px;">Shown on the project page so farmers can join, follow progress and take part.</span>
      </label>

      <label style="display:block;">
        <span style="display:block;font-size:14px;font-weight:600;color:#16361e;margin-bottom:7px;">Tags <span style="color:#8aa090;font-weight:500;">(optional, comma separated)</span></span>
        <input type="text" value="{{ tags }}" onInput="{{ onTags }}" placeholder="e.g. onions, precision, variablerate" style="width:100%;font-size:15px;color:#08100d;background:#f6fcf0;border:1px solid rgba(22,54,30,0.18);border-radius:12px;padding:14px 16px;" />
      </label>
    </div>

    {{ statusEl }}

    <div style="display:flex;gap:12px;margin-top:24px;flex-wrap:wrap;">
      <button type="button" onClick="{{ onPublish }}" style="{{ publishStyle }}" style-hover="background:#0f2716;">{{ publishLabel }}</button>
      <a href="Projects.dc.html" style="display:inline-flex;align-items:center;justify-content:center;min-height:54px;padding:0 26px;text-decoration:none;font-size:16px;font-weight:600;color:#16361e;background:transparent;border:1.5px solid rgba(22,54,30,0.24);border-radius:14px;cursor:pointer;">Cancel</a>
    </div>
    </sc-if>
  </section>

  <dc-import name="Footer" hint-size="100%,320px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{}">
class Component extends DCLogic {
  state = { status: 'ongoing', title: '', manager: '', managerRole: '', originator: '', funder: '', region: 'Groningen', timeline: '', participants: '', summary: '', overview: '', milestones: '', whatsappUrl: '', tags: '', busy: false, error: '', configured: false, me: null };

  REGION_IDS = {
    'Groningen': 'groningen', 'Friesland': 'friesland', 'Drenthe': 'drenthe', 'Noord-Holland': 'noordholland',
    'Flevoland': 'flevoland', 'Overijssel': 'overijssel', 'Utrecht': 'utrecht', 'Gelderland': 'gelderland',
    'Zuid-Holland': 'zuidholland', 'Zeeland': 'zeeland', 'Noord-Brabant': 'noordbrabant', 'Limburg': 'limburg',
  };

  h(type, props, ...children) {
    return React.createElement(type, props, ...children);
  }

  componentDidMount() {
    const configured = !!(window.AK && window.AK.isConfigured && window.AK.isConfigured());
    this.setState({ configured });
    if (configured) window.AK.onAuth((u) => this.setState({ me: u, manager: this.state.manager || (u ? u.name : '') }));
  }

  parseTags(s) {
    return String(s || '').split(',').map((t) => t.trim().replace(/^#/, '')).filter(Boolean).map((t) => '#' + t);
  }

  publish() {
    const st = this.state;
    if (st.busy) return;
    if (!st.configured) { this.setState({ error: 'Backend not configured yet (see SETUP_FIREBASE.md).' }); return; }
    if (!st.me) { window.location.href = 'SignIn.dc.html'; return; }
    if (!st.me.isAdmin) { this.setState({ error: 'Only site administrators can create topics.' }); return; }
    if (!st.title.trim()) { this.setState({ error: 'Give your topic a title.' }); return; }
    if (!st.summary.trim() && !st.overview.trim()) { this.setState({ error: 'Add a short summary or overview.' }); return; }

    this.setState({ busy: true, error: '' });
    const summary = (st.summary.trim() || st.overview.trim()).slice(0, 200);
    window.AK.addProject({
      title: st.title, status: st.status, manager: st.manager, managerRole: st.managerRole,
      originator: st.originator, funder: st.funder, region: st.region, regionId: this.REGION_IDS[st.region] || '',
      timeline: st.timeline, participants: st.participants, whatsappUrl: st.whatsappUrl,
      summary, overview: st.overview, milestones: st.milestones, tags: this.parseTags(st.tags),
    })
      .then((id) => { window.location.href = 'Project.dc.html?id=' + encodeURIComponent(id); })
      .catch((e) => { console.error(e); this.setState({ busy: false, error: (e && e.message) || 'Could not publish. Try again.' }); });
  }

  icon(name) {
    const c = { width: 19, height: 19, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 1.7, strokeLinecap: 'round', strokeLinejoin: 'round' };
    const m = {
      ongoing: [React.createElement('circle', { key: 1, cx: 12, cy: 12, r: 9 }), React.createElement('path', { key: 2, d: 'M12 7v5l3 2' })],
      past: [React.createElement('path', { key: 1, d: 'M20 6L9 17l-5-5' })],
    };
    return React.createElement('svg', c, m[name] || []);
  }

  renderVals() {
    const defs = [{ id: 'ongoing', name: 'Ongoing' }, { id: 'past', name: 'Past / completed' }];
    const statuses = defs.map((d) => {
      const active = this.state.status === d.id;
      return {
        name: d.name,
        iconEl: this.icon(d.id),
        iconWrap: 'display:flex;align-items:center;justify-content:center;margin-bottom:8px;' + (active ? 'color:#8ee05e;' : 'color:#16361e;'),
        style: 'display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:0;font-family:\'Ubuntu\',Arial,sans-serif;font-size:14px;font-weight:600;padding:16px 10px;border-radius:14px;cursor:pointer;transition:all .15s ease;'
          + (active ? 'background:#16361e;color:#eafbe1;border:1.5px solid #16361e;' : 'background:#ffffff;color:#16361e;border:1.5px solid rgba(22,54,30,0.16);'),
        onClick: () => this.setState({ status: d.id }),
      };
    });

    const st = this.state;
    const signedIn = st.configured && !!st.me;
    const admin = !!(st.me && st.me.isAdmin);
    const adminBlocked = signedIn && !admin;
    const notSignedIn = st.configured && !st.me;
    return {
      statuses,
      // Only administrators may create Topics. Show the form to admins (and, when
      // not signed in, let publish route through sign-in); block everyone else.
      canCreate: !adminBlocked,
      adminBlocked,
      adminNoticeEl: this.h('div', { style: { background: '#ffffff', border: '1px solid rgba(22,54,30,0.16)', borderRadius: 18, padding: 'clamp(24px,3vw,34px)', marginBottom: 8 } },
        this.h('h2', { style: { fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 22, color: '#16361e', margin: '0 0 8px' } }, 'Topics are created by administrators'),
        this.h('p', { style: { fontSize: 16, lineHeight: 1.6, color: '#5a7060', margin: '0 0 22px' } }, 'Member-led topics (pilots and trials) are set up by the AkkerBooster team. You can still browse every topic, join the discussion, and take part.'),
        this.h('a', { href: 'Projects.dc.html', style: { display: 'inline-flex', alignItems: 'center', justifyContent: 'center', minHeight: 50, padding: '0 26px', textDecoration: 'none', fontSize: 15, fontWeight: 700, color: '#eafbe1', background: '#16361e', borderRadius: 12 } }, 'Browse topics')
      ),
      title: st.title, manager: st.manager, managerRole: st.managerRole, originator: st.originator,
      funder: st.funder, region: st.region, timeline: st.timeline, participants: st.participants,
      summary: st.summary, overview: st.overview, milestones: st.milestones, whatsappUrl: st.whatsappUrl, tags: st.tags,
      onTitle: (e) => this.setState({ title: e.target.value }),
      onManager: (e) => this.setState({ manager: e.target.value }),
      onManagerRole: (e) => this.setState({ managerRole: e.target.value }),
      onOriginator: (e) => this.setState({ originator: e.target.value }),
      onFunder: (e) => this.setState({ funder: e.target.value }),
      onRegion: (e) => this.setState({ region: e.target.value }),
      onTimeline: (e) => this.setState({ timeline: e.target.value }),
      onParticipants: (e) => this.setState({ participants: e.target.value }),
      onSummary: (e) => this.setState({ summary: e.target.value }),
      onOverview: (e) => this.setState({ overview: e.target.value }),
      onMilestones: (e) => this.setState({ milestones: e.target.value }),
      onWhatsapp: (e) => this.setState({ whatsappUrl: e.target.value }),
      onTags: (e) => this.setState({ tags: e.target.value }),
      onPublish: () => this.publish(),
      publishLabel: st.busy ? 'Publishing…' : 'Publish topic',
      publishStyle: 'display:inline-flex;align-items:center;justify-content:center;min-height:54px;padding:0 30px;font-size:16px;font-weight:600;color:#eafbe1;background:#16361e;border:none;border-radius:14px;cursor:' + (st.busy ? 'default' : 'pointer') + ';opacity:' + (st.busy ? '0.7' : '1') + ';transition:background .15s ease;',
      statusEl: st.error
        ? this.h('div', { style: { marginTop: 18, display: 'flex', alignItems: 'center', gap: 9, background: '#fde9e3', border: '1px solid rgba(254,76,36,0.28)', borderRadius: 12, padding: '12px 14px', fontSize: 14, color: '#c43a18' } }, st.error)
        : (notSignedIn
            ? this.h('div', { style: { marginTop: 18, background: '#16361e', borderRadius: 12, padding: '12px 14px', fontSize: 14, color: '#cfe6d2' } }, 'You are not signed in — publishing will take you to the sign-in page first.')
            : null),
    };
  }
}
</script>
</body>
<style>
header{transition:opacity .28s ease,transform .28s ease,box-shadow .28s ease!important;}
html.hdr-off header{opacity:0!important;transform:translateY(-100%)!important;pointer-events:none!important;}
</style>
<script>
(function(){
  var root=document.documentElement,lastY=0,ticking=false;
  window.addEventListener('scroll',function(){
    if(ticking)return;ticking=true;
    requestAnimationFrame(function(){
      var y=Math.max(0,window.scrollY||0),d=y-lastY;
      if(y<24||d<0)root.classList.remove('hdr-off');
      else if(y>96&&d>0)root.classList.add('hdr-off');
      lastY=y;ticking=false;
    });
  },{passive:true});
})();
</script>
</html>
