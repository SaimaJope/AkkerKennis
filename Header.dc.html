<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mozilla+Text:wght@200..700&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,400;1,700&family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="assets/Favicon/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="assets/Favicon/favicon.svg" />
<link rel="shortcut icon" href="assets/Favicon/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="assets/Favicon/apple-touch-icon.png" />
<link rel="manifest" href="assets/Favicon/site.webmanifest" />
<script src="./gate.js"></script>
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  /* The runtime wraps every component in <div class="sc-host"> sized to its
     content. That short wrapper becomes the sticky header's containing block,
     so position:sticky can never pin the header - it just scrolls away, and
     scroll-up has nothing to reveal. Collapsing the wrapper's box promotes the
     header's containing block to the full-height page container, so sticky
     actually pins it and the hide/show transitions work in both directions. */
  [data-sc-name="Header"]{display:contents;}
  .ak-menu-item{transition:background .12s ease;}
  .ak-menu-item:hover{background:#f4fcec;}
  .ak-acct-trigger:hover{background:rgba(255,255,255,0.75)!important;border-color:rgba(22,54,30,0.32)!important;}
</style>
<script src="./firebase.js"></script>
</helmet>
<header style="{{ headerStyle }}">
  <div style="max-width:1200px;margin:0 auto;padding:14px clamp(20px,4vw,40px);display:flex;align-items:center;gap:24px;flex-wrap:wrap;">
    <a href="index.html" style="display:flex;align-items:center;gap:12px;text-decoration:none;flex:0 0 auto;">
      <img src="assets/logo.png" alt="AkkerBooster" width="40" height="40" style="display:block;width:40px;height:40px;border-radius:50%;" />
      <span style="font-family:'Ubuntu',Arial,sans-serif;font-size:23px;font-weight:700;color:#16361e;letter-spacing:0.2px;">AkkerBooster</span>
    </a>

    <nav style="display:flex;align-items:center;gap:clamp(14px,2.4vw,34px);flex:1 1 auto;flex-wrap:wrap;">
      <a href="index.html" style="position:relative;text-decoration:none;font-family:'Ubuntu',Arial,sans-serif;font-size:16px;font-weight:500;color:#16361e;padding:8px 0;">
        Home
        <sc-if value="{{ isHome }}" hint-placeholder-val="{{ true }}"><span style="position:absolute;left:0;right:0;bottom:0;height:3px;border-radius:2px;background:#8ee05e;"></span></sc-if>
      </a>
      <a href="Explore.dc.html" style="position:relative;text-decoration:none;font-family:'Ubuntu',Arial,sans-serif;font-size:16px;font-weight:500;color:#16361e;padding:8px 0;">
        Topics
        <sc-if value="{{ isExplore }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;left:0;right:0;bottom:0;height:3px;border-radius:2px;background:#8ee05e;"></span></sc-if>
      </a>
      <a href="Events.dc.html" style="position:relative;text-decoration:none;font-family:'Ubuntu',Arial,sans-serif;font-size:16px;font-weight:500;color:#16361e;padding:8px 0;">
        Events
        <sc-if value="{{ isEvents }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;left:0;right:0;bottom:0;height:3px;border-radius:2px;background:#8ee05e;"></span></sc-if>
      </a>
      <a href="Projects.dc.html" style="position:relative;text-decoration:none;font-family:'Ubuntu',Arial,sans-serif;font-size:16px;font-weight:500;color:#16361e;padding:8px 0;">
        Projects
        <sc-if value="{{ isProjects }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;left:0;right:0;bottom:0;height:3px;border-radius:2px;background:#8ee05e;"></span></sc-if>
      </a>
      <a href="About.dc.html" style="position:relative;text-decoration:none;font-family:'Ubuntu',Arial,sans-serif;font-size:16px;font-weight:500;color:#16361e;padding:8px 0;">
        About
        <sc-if value="{{ isAbout }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;left:0;right:0;bottom:0;height:3px;border-radius:2px;background:#8ee05e;"></span></sc-if>
      </a>
      <a href="Contact.dc.html" style="position:relative;text-decoration:none;font-family:'Ubuntu',Arial,sans-serif;font-size:16px;font-weight:500;color:#16361e;padding:8px 0;">
        Contact
        <sc-if value="{{ isContact }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;left:0;right:0;bottom:0;height:3px;border-radius:2px;background:#8ee05e;"></span></sc-if>
      </a>
    </nav>

    <div style="display:flex;align-items:center;gap:12px;flex:0 0 auto;">
      {{ authEl }}
    </div>
  </div>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:80},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;explore&quot;,&quot;events&quot;,&quot;projects&quot;,&quot;about&quot;,&quot;contact&quot;],&quot;default&quot;:&quot;home&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { me: null, menuOpen: false };

  h(type, props, ...children) {
    return React.createElement(type, props, ...children);
  }

  // Render the signed-in chrome on the FIRST paint from the cached session
  // (no logged-out flash), then reconcile with Firebase once it restores.
  componentDidMount() {
    try { const s = window.localStorage.getItem('ak_me'); if (s) this.setState({ me: JSON.parse(s) }); } catch (e) {}
    const start = Date.now();
    const tryInit = () => {
      if (window.AK && typeof window.AK.isConfigured === 'function') {
        if (!window.AK.isConfigured()) return; // no backend → keep default buttons
        window.AK.onAuth((u) => this.setState({ me: u }));
        return;
      }
      if (Date.now() - start < 6000) setTimeout(tryInit, 120);
    };
    tryInit();

    this._onDocDown = (e) => { if (this.state.menuOpen && e.target && e.target.closest && !e.target.closest('.ak-acct')) this.setState({ menuOpen: false }); };
    this._onKey = (e) => { if (e.key === 'Escape' && this.state.menuOpen) this.setState({ menuOpen: false }); };
    document.addEventListener('mousedown', this._onDocDown, true);
    document.addEventListener('keydown', this._onKey, true);
  }

  componentWillUnmount() {
    if (this._onDocDown) document.removeEventListener('mousedown', this._onDocDown, true);
    if (this._onKey) document.removeEventListener('keydown', this._onKey, true);
  }

  avatar(initials, size, photo) {
    size = size || 32;
    if (photo) {
      return this.h('img', { src: photo, alt: initials || '', style: { flex: '0 0 auto', width: size, height: size, borderRadius: '50%', objectFit: 'cover', display: 'block' } });
    }
    return this.h('span', { style: { flex: '0 0 auto', width: size, height: size, borderRadius: '50%', background: '#16361e', color: '#bff0a6', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: size > 36 ? 16 : 13, fontWeight: 600 } }, initials || '?');
  }

  ic(name) {
    const c = { width: 18, height: 18, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 1.8, strokeLinecap: 'round', strokeLinejoin: 'round', 'aria-hidden': true };
    const m = {
      user: [this.h('circle', { key: 1, cx: 12, cy: 8, r: 3.5 }), this.h('path', { key: 2, d: 'M5 20c0-3.5 3-6 7-6s7 2.5 7 6' })],
      gear: [this.h('circle', { key: 1, cx: 12, cy: 12, r: 3 }), this.h('path', { key: 2, d: 'M19.1 14.5a1.6 1.6 0 0 0 .3 1.8 2 2 0 1 1-2.7 2.7 1.6 1.6 0 0 0-1.8-.3 1.6 1.6 0 0 0-1 1.5 2 2 0 1 1-3.9 0 1.6 1.6 0 0 0-1-1.5 1.6 1.6 0 0 0-1.8.3 2 2 0 1 1-2.7-2.7 1.6 1.6 0 0 0 .3-1.8 1.6 1.6 0 0 0-1.5-1 2 2 0 1 1 0-3.9 1.6 1.6 0 0 0 1.5-1 1.6 1.6 0 0 0-.3-1.8 2 2 0 1 1 2.7-2.7 1.6 1.6 0 0 0 1.8.3 1.6 1.6 0 0 0 1-1.5 2 2 0 1 1 3.9 0 1.6 1.6 0 0 0 1 1.5 1.6 1.6 0 0 0 1.8-.3 2 2 0 1 1 2.7 2.7 1.6 1.6 0 0 0-.3 1.8 1.6 1.6 0 0 0 1.5 1 2 2 0 1 1 0 3.9 1.6 1.6 0 0 0-1.5 1z' })],
      signout: [this.h('path', { key: 1, d: 'M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4' }), this.h('path', { key: 2, d: 'M16 17l5-5-5-5' }), this.h('path', { key: 3, d: 'M21 12H9' })],
      plus: [this.h('path', { key: 1, d: 'M12 5v14M5 12h14' })],
    };
    return this.h('svg', c, ...(m[name] || []));
  }

  chevron(open) {
    return this.h('svg', { width: 16, height: 16, viewBox: '0 0 24 24', fill: 'none', stroke: '#16361e', strokeWidth: 1.8, strokeLinecap: 'round', strokeLinejoin: 'round', 'aria-hidden': true, style: { transition: 'transform .15s ease', transform: open ? 'rotate(180deg)' : 'none' } }, this.h('path', { d: 'M6 9l6 6 6-6' }));
  }

  menuItem(label, href, iconEl, opts) {
    opts = opts || {};
    const base = { display: 'flex', alignItems: 'center', gap: 11, width: '100%', boxSizing: 'border-box', textAlign: 'left', padding: '10px 12px', borderRadius: 10, fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 15, fontWeight: 500, color: opts.danger ? '#c43a18' : '#16361e', textDecoration: 'none', background: 'transparent', border: 'none', cursor: 'pointer' };
    if (href) return this.h('a', { key: label, href: href, role: 'menuitem', className: 'ak-menu-item', style: base }, iconEl, label);
    return this.h('button', { key: label, type: 'button', role: 'menuitem', className: 'ak-menu-item', onClick: opts.onClick, style: base }, iconEl, label);
  }

  authEl() {
    const me = this.state.me;
    if (me) {
      const open = this.state.menuOpen;
      return this.h('div', { className: 'ak-acct', style: { position: 'relative' } },
        this.h('button', {
          type: 'button', 'aria-haspopup': 'menu', 'aria-expanded': open, className: 'ak-acct-trigger',
          onClick: () => this.setState((s) => ({ menuOpen: !s.menuOpen })),
          style: { display: 'inline-flex', alignItems: 'center', gap: 9, minHeight: 46, padding: '0 12px 0 6px', cursor: 'pointer', whiteSpace: 'nowrap', background: open ? 'rgba(255,255,255,0.75)' : 'transparent', border: '1.5px solid rgba(22,54,30,0.2)', borderRadius: 999, fontFamily: "'Ubuntu',Arial,sans-serif", transition: 'background .12s ease,border-color .12s ease' },
        }, this.avatar(me.initials, 32, me.photo), this.h('span', { style: { fontSize: 15, fontWeight: 600, color: '#16361e' } }, me.name), this.chevron(open)),
        open ? this.h('div', { role: 'menu', style: { position: 'absolute', right: 0, top: 'calc(100% + 8px)', width: 250, background: '#ffffff', border: '1px solid rgba(22,54,30,0.13)', borderRadius: 16, boxShadow: '0 18px 44px -16px rgba(16,40,22,0.40)', padding: 8, zIndex: 60 } },
          this.h('div', { style: { display: 'flex', alignItems: 'center', gap: 11, padding: '8px 12px 12px', borderBottom: '1px solid rgba(22,54,30,0.10)', marginBottom: 6 } },
            this.avatar(me.initials, 40, me.photo),
            this.h('div', { style: { minWidth: 0 } },
              this.h('div', { style: { fontSize: 15, fontWeight: 700, color: '#16361e', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' } }, me.name),
              this.h('div', { style: { fontSize: 13, color: '#5a7060', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' } }, me.email || '')
            )
          ),
          this.menuItem('New topic', 'CreatePost.dc.html', this.ic('plus')),
          this.menuItem('Your profile', 'Profile.dc.html', this.ic('user')),
          this.menuItem('Account settings', 'Account.dc.html', this.ic('gear')),
          this.h('div', { style: { height: 1, background: 'rgba(22,54,30,0.10)', margin: '6px 4px' } }),
          this.menuItem('Sign out', null, this.ic('signout'), { danger: true, onClick: () => { this.setState({ menuOpen: false }); window.AK.signOut().then(() => { window.location.href = 'index.html'; }); } })
        ) : null
      );
    }
    return this.h(React.Fragment, null,
      this.h('a', { href: 'SignIn.dc.html', style: { display: 'inline-flex', alignItems: 'center', justifyContent: 'center', minHeight: 46, padding: '0 20px', whiteSpace: 'nowrap', textDecoration: 'none', fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 16, fontWeight: 600, color: '#16361e', border: '1.5px solid rgba(22,54,30,0.22)', borderRadius: 999, background: 'transparent' } }, 'Sign in'),
      this.h('a', { href: 'SignUp.dc.html', style: { display: 'inline-flex', alignItems: 'center', justifyContent: 'center', minHeight: 46, padding: '0 22px', whiteSpace: 'nowrap', textDecoration: 'none', fontFamily: "'Ubuntu',Arial,sans-serif", fontSize: 16, fontWeight: 600, color: '#eafbe1', background: '#16361e', border: '1.5px solid #16361e', borderRadius: 999 } }, 'Create account')
    );
  }

  headerStyle() {
    return {
      position: 'sticky',
      top: 0,
      zIndex: 50,
      background: '#effbe7',
      borderBottom: '1px solid rgba(22,54,30,0.12)',
      backdropFilter: 'saturate(1.1) blur(6px)',
      WebkitBackdropFilter: 'saturate(1.1) blur(6px)',
      transition: 'opacity .28s ease, transform .28s ease, box-shadow .28s ease',
      willChange: 'opacity, transform',
    };
  }

  renderVals() {
    const a = this.props.active || 'home';
    return {
      headerStyle: this.headerStyle(),
      authEl: this.authEl(),
      isHome: a === 'home',
      isExplore: a === 'explore',
      isEvents: a === 'events',
      isProjects: a === 'projects',
      isAbout: a === 'about',
      isContact: a === 'contact',
    };
  }
}
</script>
</body>
</html>
